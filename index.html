<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accountability Chart</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Light mode (default) */
            --bg-primary: #fafafa;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f4f4f5;
            --border-color: #e4e4e7;
            --border-light: #f1f1f2;
            --text-primary: #18181b;
            --text-secondary: #52525b;
            --text-tertiary: #71717a;
            --accent-blue: #3b82f6;
            --accent-blue-light: #eff6ff;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --line-color: #d4d4d8;
            --line-active: #a1a1aa;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --transition-speed: 0.3s;
        }

        /* Dark mode */
        [data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --border-color: #475569;
            --border-light: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-tertiary: #94a3b8;
            --accent-blue: #60a5fa;
            --accent-blue-light: #1e3a5f;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.3);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.4), 0 2px 4px -2px rgb(0 0 0 / 0.4);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.5), 0 4px 6px -4px rgb(0 0 0 / 0.5);
            --line-color: #475569;
            --line-active: #64748b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
            transition: background-color var(--transition-speed), color var(--transition-speed);
        }

        .header {
            background: var(--bg-secondary);
            padding: 12px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            transition: background-color var(--transition-speed), border-color var(--transition-speed);
        }

        .header-left {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .company-name {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);
            background: transparent;
            border: none;
            padding: 0;
            font-family: inherit;
            width: auto;
            min-width: 200px;
            transition: color var(--transition-speed);
        }

        .company-name:hover {
            background: var(--bg-tertiary);
            border-radius: var(--radius-sm);
            padding: 4px 8px;
            margin: -4px -8px;
        }

        .company-name:focus {
            outline: none;
            background: var(--bg-tertiary);
            border-radius: var(--radius-sm);
            padding: 4px 8px;
            margin: -4px -8px;
        }

        .header span {
            color: var(--text-tertiary);
            font-size: 13px;
            transition: color var(--transition-speed);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .file-actions {
            display: flex;
            gap: 8px;
        }

        .export-actions {
            display: flex;
            gap: 8px;
        }

        .file-btn {
            padding: 8px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }

        .file-btn:hover {
            background: var(--bg-tertiary);
            border-color: var(--line-active);
            color: var(--text-primary);
        }

        .file-btn svg {
            width: 14px;
            height: 14px;
        }

        .tabs {
            display: flex;
            gap: 4px;
            background: var(--bg-tertiary);
            padding: 4px;
            border-radius: var(--radius-md);
            transition: background-color var(--transition-speed);
        }

        .tab {
            padding: 8px 16px;
            background: transparent;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            color: var(--text-tertiary);
            font-weight: 500;
        }

        .tab:hover {
            color: var(--text-primary);
        }

        .tab.active {
            background: var(--bg-secondary);
            color: var(--text-primary);
            box-shadow: var(--shadow-sm);
        }

        /* Theme Toggle */
        .theme-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 6px 12px;
            background: var(--bg-tertiary);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            border-color: var(--line-active);
        }

        .theme-toggle input {
            display: none;
        }

        .theme-slider {
            width: 44px;
            height: 24px;
            background: var(--border-color);
            border-radius: 24px;
            position: relative;
            transition: background 0.3s;
        }

        .theme-slider::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.3s;
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
        }

        .theme-toggle input:checked + .theme-slider {
            background: var(--accent-blue);
        }

        .theme-toggle input:checked + .theme-slider::after {
            transform: translateX(20px);
        }

        .theme-icon {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 16px 24px;
        }

        /* Chart View */
        .chart-view {
            display: none;
        }

        .chart-view.active {
            display: block;
        }

        .chart-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .legend {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
            padding: 4px 10px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            transition: background-color var(--transition-speed), border-color var(--transition-speed), color var(--transition-speed);
        }

        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .view-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .control-btn {
            padding: 6px 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }

        .control-btn:hover {
            border-color: var(--line-active);
            color: var(--text-primary);
        }

        .control-btn.active {
            background: var(--accent-blue-light);
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }

        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .toggle-switch input {
            display: none;
        }

        .toggle-slider {
            width: 36px;
            height: 20px;
            background: var(--border-color);
            border-radius: 20px;
            position: relative;
            transition: background 0.2s;
        }

        .toggle-slider::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.2s;
            box-shadow: var(--shadow-sm);
        }

        .toggle-switch input:checked + .toggle-slider {
            background: var(--accent-blue);
        }

        .toggle-switch input:checked + .toggle-slider::after {
            transform: translateX(16px);
        }

        /* Horizontal Tree Layout */
        .org-tree {
            display: flex;
            justify-content: flex-start;
            padding: 20px;
            overflow: hidden;
            position: relative;
            height: calc(100vh - 180px);
            cursor: grab;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            transition: background-color var(--transition-speed), border-color var(--transition-speed);
        }

        .org-tree:active {
            cursor: grabbing;
        }

        .tree-container {
            transform-origin: left center;
            transition: transform 0.1s ease-out;
        }

        /* Tree - Horizontal Layout */
        .tree {
            display: flex;
            flex-direction: row;
            align-items: center;
        }

        .tree-node {
            display: flex;
            flex-direction: row;
            align-items: center;
            position: relative;
        }

        .node-content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: row;
            align-items: center;
        }

        .node-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-left: 3px solid var(--node-color, var(--accent-blue));
            border-radius: var(--radius-md);
            padding: 14px 20px;
            min-width: 180px;
            max-width: 240px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            box-shadow: var(--shadow-sm);
        }

        .node-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
            border-color: var(--line-active);
        }

        .node-card.dragging {
            opacity: 0.5;
            transform: rotate(2deg);
        }

        .node-card.drag-over {
            border-color: var(--accent-blue);
            background: var(--accent-blue-light);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .node-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 4px;
        }

        .node-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.3;
            transition: color var(--transition-speed);
        }

        .drag-handle {
            cursor: grab;
            color: var(--text-tertiary);
            padding: 2px;
            display: none;
            font-size: 14px;
            line-height: 1;
            transition: color var(--transition-speed);
        }

        .drag-handle:active {
            cursor: grabbing;
        }

        .node-card:hover .drag-handle {
            display: block;
        }

        .node-role {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 2px;
            transition: color var(--transition-speed);
        }

        .node-domain {
            font-size: 11px;
            color: var(--text-tertiary);
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px solid var(--border-light);
            transition: color var(--transition-speed), border-color var(--transition-speed);
        }

        /* Collapse/Expand Button */
        .collapse-btn {
            position: absolute;
            right: -10px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: var(--text-tertiary);
            transition: all 0.2s;
            z-index: 10;
            box-shadow: var(--shadow-sm);
        }

        .collapse-btn:hover {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
            background: var(--accent-blue-light);
        }

        .child-count-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: var(--accent-blue);
            color: white;
            font-size: 9px;
            font-weight: 600;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-sm);
        }

        /* Connection Lines - Horizontal Layout */
        .children {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 60px;
            position: relative;
        }

        .child-wrapper {
            display: flex;
            flex-direction: row;
            align-items: center;
            padding: 8px 0;
            position: relative;
        }

        /* Horizontal line from parent to children container */
        .horizontal-line-right {
            position: absolute;
            left: -60px;
            top: 50%;
            transform: translateY(-50%);
            width: 60px;
            height: 2px;
            background: var(--line-color);
            pointer-events: none;
            transition: all 0.3s ease;
        }

        /* Vertical line connector for multiple children */
        .vertical-connector {
            position: absolute;
            left: -60px;
            width: 2px;
            background: var(--line-color);
            pointer-events: none;
            transition: all 0.3s ease;
            display: none;
        }

        /* Single continuous vertical spine for each sibling group */
        .children-spine {
            position: absolute;
            left: 0;
            width: 2px;
            background: var(--line-color);
            pointer-events: none;
            transition: all 0.3s ease;
        }

        /* Vertical line to each child */
        .vertical-line-to-child {
            position: absolute;
            left: -60px;
            top: 50%;
            width: 2px;
            height: 2px;
            background: var(--line-color);
            pointer-events: none;
            transition: all 0.3s ease;
        }

        /* First child - top half of vertical connector */
        .child-wrapper:first-of-type .vertical-connector {
            top: 50%;
            bottom: 0;
        }

        /* Last child - bottom half of vertical connector */
        .child-wrapper:last-of-type .vertical-connector {
            top: 0;
            bottom: 50%;
        }

        /* Middle children - full vertical connector */
        .child-wrapper:not(:first-of-type):not(:last-of-type) .vertical-connector {
            top: 0;
            bottom: 0;
        }

        /* Single child - small vertical line only */
        .child-wrapper:only-of-type .vertical-connector {
            display: none;
        }

        /* Children container animations */
        .children-container {
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            max-width: 2000px;
            opacity: 1;
        }

        .children-container.collapsed {
            max-width: 0;
            opacity: 0;
            padding-left: 0;
        }

        /* Drag and Drop Styles */
        .sortable-ghost {
            opacity: 0.4;
            background: var(--bg-tertiary);
            border: 2px dashed var(--line-active);
        }

        .sortable-drag {
            opacity: 0.9;
            transform: scale(1.05) rotate(2deg);
            box-shadow: var(--shadow-lg);
        }

        .drop-target {
            position: relative;
        }

        .drop-target::before {
            content: '';
            position: absolute;
            inset: -4px;
            border: 2px dashed var(--accent-blue);
            border-radius: var(--radius-md);
            pointer-events: none;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Reparenting drag styles */
        .reparent-dragging .node-card {
            opacity: 0.4;
            transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s, border-color 0.2s;
        }

        .reparent-dragging .node-card.drag-source {
            opacity: 0.6;
            border-color: var(--accent-blue);
            background: var(--accent-blue-light);
        }

        .reparent-dragging .node-card.valid-drop-target {
            opacity: 1;
            border: 2px solid var(--accent-blue);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
            cursor: copy;
        }

        .reparent-dragging .node-card.valid-drop-target:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 25px -5px rgba(59, 130, 246, 0.3), 0 0 0 4px rgba(59, 130, 246, 0.2);
            background: var(--accent-blue-light);
        }

        .reparent-dragging .node-card.invalid-drop-target {
            opacity: 0.2;
            cursor: not-allowed;
        }

        .node-card.drag-over-valid {
            border-color: var(--accent-blue) !important;
            background: var(--accent-blue-light) !important;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.3), 0 8px 25px -5px rgba(59, 130, 246, 0.4) !important;
            transform: translateY(-3px) scale(1.03) !important;
        }

        .node-card.drag-over-invalid {
            border-color: #dc2626 !important;
            background: #fef2f2 !important;
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.2) !important;
            cursor: not-allowed !important;
        }

        [data-theme="dark"] .node-card.drag-over-invalid {
            background: #450a0a !important;
        }

        /* Drop indicator line */
        .drop-indicator {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            background: var(--accent-blue);
            border-radius: 2px;
            opacity: 0;
            transition: opacity 0.15s;
        }

        .drop-indicator.active {
            opacity: 1;
        }

        /* Drag handle improvements */
        .drag-handle {
            cursor: grab;
            color: var(--text-tertiary);
            padding: 4px;
            display: none;
            font-size: 14px;
            line-height: 1;
            transition: all 0.2s;
            border-radius: 4px;
            user-select: none;
        }

        .drag-handle:hover {
            background: var(--bg-tertiary);
            color: var(--accent-blue);
        }

        .drag-handle:active {
            cursor: grabbing;
        }

        /* Focus Mode */
        .focus-mode .node-card {
            opacity: 0.4;
            transform: scale(0.95);
            transition: all 0.3s ease;
        }

        .focus-mode .node-card.focused {
            opacity: 1;
            transform: scale(1);
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .focus-mode .node-card.focused-child {
            opacity: 1;
            transform: scale(1);
        }

        /* Hover expand preview */
        .hover-expand-preview .children-container {
            opacity: 0.7;
        }

        /* Edit View */
        .edit-view {
            display: none;
        }

        .edit-view.active {
            display: block;
        }

        .edit-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 24px;
        }

        .form-panel {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: 24px;
            border: 1px solid var(--border-color);
            height: fit-content;
            position: sticky;
            top: 90px;
            box-shadow: var(--shadow-sm);
            transition: background-color var(--transition-speed), border-color var(--transition-speed);
        }

        .form-panel h2 {
            font-size: 16px;
            margin-bottom: 20px;
            color: var(--text-primary);
            font-weight: 600;
            transition: color var(--transition-speed);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
            transition: color var(--transition-speed);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.2s;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: var(--bg-secondary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-top: 8px;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--text-primary);
            color: var(--bg-secondary);
        }

        .btn-primary:hover {
            background: var(--text-secondary);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--border-color);
            color: var(--text-primary);
        }

        .btn-danger {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }

        [data-theme="dark"] .btn-danger {
            background: #450a0a;
            color: #fca5a5;
            border: 1px solid #7f1d1d;
        }

        .btn-danger:hover {
            background: #fee2e2;
        }

        [data-theme="dark"] .btn-danger:hover {
            background: #7f1d1d;
        }

        .btn-group {
            display: flex;
            gap: 8px;
        }

        .btn-group .btn {
            flex: 1;
        }

        .list-panel {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: 24px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            transition: background-color var(--transition-speed), border-color var(--transition-speed);
        }

        .list-panel h2 {
            font-size: 16px;
            margin-bottom: 20px;
            color: var(--text-primary);
            font-weight: 600;
            transition: color var(--transition-speed);
        }

        .person-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .person-item {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .person-item:hover {
            border-color: var(--line-active);
            background: var(--bg-secondary);
        }

        .person-item.selected {
            border-color: var(--accent-blue);
            background: var(--accent-blue-light);
        }

        .person-info h3 {
            font-size: 14px;
            color: var(--text-primary);
            margin-bottom: 2px;
            font-weight: 500;
            transition: color var(--transition-speed);
        }

        .person-info p {
            font-size: 12px;
            color: var(--text-tertiary);
            transition: color var(--transition-speed);
        }

        .person-actions {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .icon-btn {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--text-tertiary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 13px;
        }

        .icon-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .icon-btn.delete:hover {
            background: #fee2e2;
            color: #dc2626;
        }

        [data-theme="dark"] .icon-btn.delete:hover {
            background: #450a0a;
            color: #fca5a5;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-tertiary);
            transition: color var(--transition-speed);
        }

        .empty-state h3 {
            font-size: 16px;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-weight: 500;
            transition: color var(--transition-speed);
        }

        .zoom-controls {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            z-index: 100;
            background: var(--bg-secondary);
            padding: 4px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-lg);
            transition: background-color var(--transition-speed), border-color var(--transition-speed);
        }

        .zoom-btn {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-sm);
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .zoom-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .role-types-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            transition: border-color var(--transition-speed);
        }

        .role-types-section h3 {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            transition: color var(--transition-speed);
        }

        .role-type-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .role-type-item input[type="text"] {
            flex: 1;
            padding: 8px 10px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 13px;
            transition: background-color var(--transition-speed), border-color var(--transition-speed), color var(--transition-speed);
        }

        .role-type-item input[type="color"] {
            width: 32px;
            height: 28px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            background: transparent;
            padding: 0;
        }

        .role-type-item .icon-btn {
            width: 24px;
            height: 24px;
        }

        .add-role-btn {
            background: transparent;
            border: 1px dashed var(--border-color);
            color: var(--text-tertiary);
            padding: 8px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 12px;
            width: 100%;
            margin-top: 8px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .add-role-btn:hover {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
            background: var(--accent-blue-light);
        }

        /* Desktop wide screen optimizations */
        @media (min-width: 1400px) {
            .container {
                padding: 12px 32px;
            }

            .org-tree {
                height: calc(100vh - 160px);
                padding: 16px;
            }

            .node-card {
                min-width: 200px;
                max-width: 280px;
                padding: 16px 22px;
            }
        }

        /* Extra wide screens */
        @media (min-width: 1920px) {
            .container {
                padding: 10px 40px;
            }

            .org-tree {
                height: calc(100vh - 150px);
                padding: 12px;
            }

            .node-card {
                min-width: 220px;
                max-width: 300px;
                padding: 18px 24px;
            }
        }

        @media (max-width: 900px) {
            .edit-layout {
                grid-template-columns: 1fr;
            }

            .form-panel {
                position: static;
            }

            .header-actions {
                flex-wrap: wrap;
                gap: 10px;
            }

            .file-actions {
                order: 2;
                width: 100%;
            }

            .org-tree {
                height: calc(100vh - 220px);
                padding: 16px;
            }

            /* Mobile vertical layout */
            .tree {
                flex-direction: column;
            }

            .tree-node {
                flex-direction: column;
            }

            .children {
                flex-direction: column;
                padding-left: 0;
                padding-top: 40px;
            }

            .child-wrapper {
                flex-direction: column;
                padding: 10px 0;
            }

            /* Hide horizontal lines on mobile */
            .horizontal-line-right,
            .vertical-connector,
            .vertical-line-to-child,
            .children-spine {
                display: none;
            }
        }

        /* Print Styles */
        @media print {
            body {
                background: white;
                color: black;
            }

            .header {
                background: white;
                border-bottom: 1px solid #ccc;
                color: black;
            }

            .company-name {
                color: black !important;
                background: transparent !important;
            }

            .header span {
                color: #666;
            }

            .file-actions,
            .export-actions,
            .tabs,
            .zoom-controls,
            #editView,
            .icon-btn {
                display: none !important;
            }

            .container {
                padding: 10px;
                max-width: 100%;
            }

            .chart-view {
                display: block !important;
            }

            .org-tree {
                height: auto;
                overflow: visible;
                cursor: default;
            }

            .tree-container {
                transform: none !important;
            }

            .node-card {
                background: white !important;
                border: 2px solid #333 !important;
                box-shadow: none !important;
                color: black !important;
            }

            .node-name {
                color: black !important;
            }

            .node-role {
                color: #444 !important;
            }

            .node-domain {
                color: #666 !important;
                border-top-color: #ccc !important;
            }

            .legend {
                margin-bottom: 20px;
            }

            .legend-item {
                color: #333;
            }

            /* Connection lines for print */
            .horizontal-line-right,
            .vertical-connector,
            .children-spine,
            .vertical-line-to-child {
                background: #999 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            /* Ensure background colors print */
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }

        /* Export notification */
        .export-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <input type="text" class="company-name" id="companyName" value="Kasko Cattle">
            <span>Organizational Accountability Chart</span>
        </div>
        <div class="header-actions">
            <!-- Theme Toggle -->
            <label class="theme-toggle" title="Toggle Dark Mode">
                <span class="theme-icon">☀️</span>
                <input type="checkbox" id="themeToggle" onchange="toggleTheme()">
                <span class="theme-slider"></span>
                <span class="theme-icon">🌙</span>
            </label>
            <div class="file-actions">
                <button class="file-btn" onclick="exportData()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    Save to File
                </button>
                <button class="file-btn" onclick="document.getElementById('fileInput').click()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    Load from File
                </button>
                <input type="file" id="fileInput" accept=".json" style="display: none;" onchange="importData(this)">
            </div>
            <div class="export-actions">
                <button class="file-btn" onclick="printChart()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="6 9 6 2 18 2 18 9"></polyline>
                        <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
                        <rect x="6" y="14" width="12" height="8"></rect>
                    </svg>
                    Print / PDF
                </button>
                <button class="file-btn" onclick="exportPNG()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <circle cx="8.5" cy="8.5" r="1.5"></circle>
                        <polyline points="21 15 16 10 5 21"></polyline>
                    </svg>
                    Export PNG
                </button>
            </div>
            <div class="tabs">
                <button class="tab active" onclick="showView('chart')">Chart View</button>
                <button class="tab" onclick="showView('edit')">Edit People</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div id="chartView" class="chart-view active">
            <div class="chart-controls">
                <div class="legend" id="legend"></div>
                <div class="view-controls">
                    <button class="control-btn" id="expandAllBtn" onclick="expandAll()">Expand All</button>
                    <button class="control-btn" id="collapseAllBtn" onclick="collapseAll()">Collapse All</button>
                    <label class="toggle-switch">
                        <input type="checkbox" id="hoverExpandToggle" onchange="toggleHoverMode()">
                        <span class="toggle-slider"></span>
                        Hover to Expand
                    </label>
                </div>
            </div>
            <div class="zoom-controls">
                <button class="zoom-btn" onclick="zoomIn()" title="Zoom In">+</button>
                <button class="zoom-btn" onclick="resetZoom()" title="Reset">⟲</button>
                <button class="zoom-btn" onclick="zoomOut()" title="Zoom Out">−</button>
            </div>
            <div id="orgTree" class="org-tree"></div>
        </div>

        <div id="editView" class="edit-view">
            <div class="edit-layout">
                <div class="form-panel">
                    <h2 id="formTitle">Add Person</h2>
                    <form id="personForm">
                        <input type="hidden" id="personId">
                        <div class="form-group">
                            <label>Name</label>
                            <input type="text" id="name" placeholder="e.g., John Smith" required>
                        </div>
                        <div class="form-group">
                            <label>Role / Title</label>
                            <input type="text" id="role" placeholder="e.g., Operations Manager" required>
                        </div>
                        <div class="form-group">
                            <label>Domain / Function</label>
                            <input type="text" id="domain" placeholder="e.g., Operations">
                        </div>
                        <div class="form-group">
                            <label>Reports To</label>
                            <select id="reportsTo">
                                <option value="">None (Top Level)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Type</label>
                            <select id="type"></select>
                        </div>
                        <div class="form-group">
                            <label>Key Accountabilities</label>
                            <textarea id="accountabilities" placeholder="What this role is responsible for..."></textarea>
                        </div>
                        <div class="form-group">
                            <label>Decision Rights</label>
                            <textarea id="decisions" placeholder="What decisions can this role make..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Save Person</button>
                        <button type="button" class="btn btn-secondary" onclick="resetForm()">Clear Form</button>
                        <button type="button" id="deleteBtn" class="btn btn-danger" style="display: none; margin-top: 10px;" onclick="deletePerson()">Delete Person</button>
                    </form>

                    <div class="role-types-section">
                        <h3>Role Types</h3>
                        <div id="roleTypesList"></div>
                        <button class="add-role-btn" onclick="addRoleType()">+ Add Role Type</button>
                    </div>
                </div>

                <div class="list-panel">
                    <h2>People</h2>
                    <div id="personList" class="person-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const defaultRoleTypes = [
            { id: 'chairman', name: 'Chairman', color: '#f59e0b' },
            { id: 'ai-agent', name: 'AI Agent', color: '#10b981' },
            { id: 'human', name: 'Human Team', color: '#3b82f6' }
        ];

        let companyName = localStorage.getItem('org_chart_company_name') || 'Kasko Cattle';
        let roleTypes = JSON.parse(localStorage.getItem('org_chart_role_types')) || defaultRoleTypes;
        let people = JSON.parse(localStorage.getItem('org_chart_people')) || [
            { id: 1, name: "Nathaniel", role: "Chairman", domain: "Governance", reportsTo: null, type: "chairman", accountabilities: "Strategic direction; final authority", decisions: "All major decisions" },
            { id: 2, name: "Belisarius", role: "CEO", domain: "Executive", reportsTo: 1, type: "ai-agent", accountabilities: "Strategy execution; operations oversight", decisions: "Day-to-day operations; hiring" },
            { id: 3, name: "Ghost", role: "CFO/COO", domain: "Finance/Operations", reportsTo: 2, type: "ai-agent", accountabilities: "Financial management; operational efficiency", decisions: "Budget approval; vendor selection" },
            { id: 4, name: "Ironhide", role: "Maintenance Ops", domain: "Operations", reportsTo: 3, type: "ai-agent", accountabilities: "Daily operations; team coordination", decisions: "Scheduling; resource allocation" }
        ];

        let editingId = null;
        let collapsedNodes = new Set();
        let hoverExpandEnabled = false;
        let hoverExpandTimeout = null;
        let sortableInstances = [];

        // Theme management
        let currentTheme = localStorage.getItem('org_chart_theme') || 'light';

        function initTheme() {
            document.documentElement.setAttribute('data-theme', currentTheme);
            document.getElementById('themeToggle').checked = currentTheme === 'dark';
        }

        function toggleTheme() {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', currentTheme);
            localStorage.setItem('org_chart_theme', currentTheme);
        }

        function saveData() {
            localStorage.setItem('org_chart_company_name', companyName);
            localStorage.setItem('org_chart_role_types', JSON.stringify(roleTypes));
            localStorage.setItem('org_chart_people', JSON.stringify(people));
            localStorage.setItem('org_chart_collapsed', JSON.stringify([...collapsedNodes]));
        }

        function loadCollapsedState() {
            const saved = localStorage.getItem('org_chart_collapsed');
            if (saved) {
                collapsedNodes = new Set(JSON.parse(saved));
            }
        }

        function init() {
            initTheme();
            loadCollapsedState();
            document.getElementById('companyName').value = companyName;
            renderRoleTypes();
            updateTypeSelect();
            showView('chart');
        }

        document.getElementById('companyName').addEventListener('change', function() {
            companyName = this.value;
            saveData();
        });

        function showView(view) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.chart-view, .edit-view').forEach(v => v.classList.remove('active'));
            
            if (view === 'chart') {
                document.getElementById('chartView').classList.add('active');
                document.querySelectorAll('.tab')[0].classList.add('active');
                renderTree();
                renderLegend();
            } else {
                document.getElementById('editView').classList.add('active');
                document.querySelectorAll('.tab')[1].classList.add('active');
                renderList();
                updateReportsToOptions();
                renderRoleTypes();
            }
        }

        function renderLegend() {
            const container = document.getElementById('legend');
            let html = roleTypes.map(rt => `
                <div class="legend-item">
                    <div class="legend-dot" style="background: ${rt.color}"></div>
                    <span>${rt.name}</span>
                </div>
            `).join('');
            // Add drag hint
            html += `
                <div class="legend-item" title="Drag the handle (⋮⋮) on any node to move it to a different parent">
                    <span style="font-size: 10px; margin-right: 4px;">⋮⋮</span>
                    <span>Drag to move</span>
                </div>
            `;
            container.innerHTML = html;
        }

        function buildTree() {
            const root = people.filter(p => !p.reportsTo);
            
            function addChildren(parent) {
                const children = people.filter(p => p.reportsTo === parent.id);
                return { ...parent, children: children.map(addChildren) };
            }
            
            return root.map(addChildren);
        }

        function getTypeColor(typeId) {
            const type = roleTypes.find(rt => rt.id === typeId);
            return type ? type.color : '#3b82f6';
        }

        // Render tree node with horizontal layout and proper connection lines
        function renderTreeNode(node, level = 0, isRoot = true) {
            const hasChildren = node.children && node.children.length > 0;
            const nodeColor = getTypeColor(node.type);
            const isCollapsed = collapsedNodes.has(node.id);
            const multipleChildren = hasChildren && node.children.length > 1;
            
            let nodeHtml = `
                <div class="node-content" data-node-id="${node.id}">
                    <div class="node-card" style="--node-color: ${nodeColor}" 
                         onclick="selectPerson(${node.id})"
                         onmouseenter="handleNodeHover(${node.id}, true)"
                         onmouseleave="handleNodeHover(${node.id}, false)">
                        ${hasChildren && isCollapsed ? `<div class="child-count-badge">${node.children.length}</div>` : ''}
                        <div class="node-header">
                            <div class="node-name">${node.name}</div>
                            <div class="drag-handle" draggable="true" ondragstart="handleDragStart(event, ${node.id})" title="Drag to reorder">⋮⋮</div>
                        </div>
                        <div class="node-role">${node.role}</div>
                        ${node.domain ? `<div class="node-domain">${node.domain}</div>` : ''}
                        ${hasChildren ? `
                            <button class="collapse-btn" onclick="event.stopPropagation(); toggleCollapse(${node.id})" title="${isCollapsed ? 'Expand' : 'Collapse'}">
                                ${isCollapsed ? '+' : '−'}
                            </button>
                        ` : ''}
                    </div>
                </div>
            `;
            
            let childrenHtml = '';
            if (hasChildren) {
                childrenHtml += `<div class="children-container ${isCollapsed ? 'collapsed' : ''}" data-parent-id="${node.id}">`;
                childrenHtml += `<div class="children" data-children-of="${node.id}">`;
                node.children.forEach((child, index) => {
                    childrenHtml += `
                        <div class="child-wrapper" data-child-id="${child.id}">
                            <div class="horizontal-line-right"></div>
                            ${multipleChildren ? `<div class="vertical-connector"></div>` : ''}
                            ${renderTreeNode(child, level + 1, false)}
                        </div>`;
                });
                childrenHtml += `</div></div>`;
            }
            
            return `<div class="tree-node ${isRoot ? 'root-node' : ''}" data-node-id="${node.id}">${nodeHtml}${childrenHtml}</div>`;
        }

        const WHEEL_ZOOM_SENSITIVITY = 0.00032;
        let zoomLevel = 1;
        let panX = 0;
        let panY = 0;
        let isPanning = false;
        let lastMouseX = 0;
        let lastMouseY = 0;
        let panZoomListenersAttached = false;

        function renderTree() {
            // Clean up old Sortable instances
            sortableInstances.forEach(s => s.destroy());
            sortableInstances = [];
            
            const tree = buildTree();
            const container = document.getElementById('orgTree');
            
            if (tree.length === 0) {
                container.innerHTML = `<div class="empty-state"><h3>No people added yet</h3><p>Switch to Edit People to add your team</p></div>`;
                return;
            }
            
            container.innerHTML = '<div class="tree-container" id="treeContainer"><div class="tree">' + tree.map(n => renderTreeNode(n, 0, true)).join('') + '</div></div>';
            
            applyTransform();
            updateChildrenSpines();
            setupPanZoom();
            initDragAndDrop();
        }

        function updateChildrenSpines() {
            document.querySelectorAll('.children').forEach(childrenEl => {
                childrenEl.querySelectorAll('.children-spine').forEach(spine => spine.remove());

                const wrappers = childrenEl.querySelectorAll(':scope > .child-wrapper');
                if (wrappers.length <= 1) return;

                const first = wrappers[0];
                const last = wrappers[wrappers.length - 1];
                const firstCenter = first.offsetTop + (first.offsetHeight / 2);
                const lastCenter = last.offsetTop + (last.offsetHeight / 2);
                const height = Math.max(0, lastCenter - firstCenter);

                const spine = document.createElement('div');
                spine.className = 'children-spine';
                spine.style.top = `${firstCenter}px`;
                spine.style.height = `${height}px`;
                childrenEl.appendChild(spine);
            });
        }

        function applyTransform() {
            const container = document.getElementById('treeContainer');
            if (container) container.style.transform = `translate(${panX}px, ${panY}px) scale(${zoomLevel})`;
        }

        function zoomIn() { zoomLevel = Math.min(zoomLevel * 1.2, 3); applyTransform(); }
        function zoomOut() { zoomLevel = Math.max(zoomLevel / 1.2, 0.3); applyTransform(); }
        function resetZoom() { zoomLevel = 1; panX = 0; panY = 0; applyTransform(); }

        function setupPanZoom() {
            const treeArea = document.getElementById('orgTree');
            if (!treeArea || panZoomListenersAttached) return;
            panZoomListenersAttached = true;

            treeArea.addEventListener('wheel', function(e) {
                if (e.target.closest('.node-card')) return;
                e.preventDefault();
                const dy = Math.max(-150, Math.min(150, e.deltaY));
                const factor = Math.exp(-dy * WHEEL_ZOOM_SENSITIVITY);
                zoomLevel = Math.max(0.3, Math.min(3, zoomLevel * factor));
                applyTransform();
            }, { passive: false });

            treeArea.addEventListener('mousedown', function(e) {
                if (e.target.closest('.node-card')) return;
                isPanning = true;
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
                treeArea.style.cursor = 'grabbing';
            });

            document.addEventListener('mousemove', function(e) {
                if (!isPanning) return;
                const deltaX = e.clientX - lastMouseX;
                const deltaY = e.clientY - lastMouseY;
                panX += deltaX;
                panY += deltaY;
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
                applyTransform();
            });

            document.addEventListener('mouseup', function() {
                isPanning = false;
                treeArea.style.cursor = 'grab';
            });
        }

        // Collapse/Expand Functions
        function toggleCollapse(nodeId, event) {
            if (event) event.stopPropagation();
            
            if (collapsedNodes.has(nodeId)) {
                collapsedNodes.delete(nodeId);
            } else {
                collapsedNodes.add(nodeId);
            }
            
            saveData();
            renderTree();
        }

        function expandAll() {
            collapsedNodes.clear();
            saveData();
            renderTree();
        }

        function collapseAll() {
            people.forEach(person => {
                const hasChildren = people.some(p => p.reportsTo === person.id);
                if (hasChildren) collapsedNodes.add(person.id);
            });
            saveData();
            renderTree();
        }

        function toggleHoverMode() {
            hoverExpandEnabled = document.getElementById('hoverExpandToggle').checked;
        }

        function handleNodeHover(nodeId, isHovering) {
            if (!hoverExpandEnabled) return;
            
            if (isHovering && collapsedNodes.has(nodeId)) {
                hoverExpandTimeout = setTimeout(() => {
                    collapsedNodes.delete(nodeId);
                    saveData();
                    renderTree();
                }, 400);
            } else if (!isHovering && hoverExpandTimeout) {
                clearTimeout(hoverExpandTimeout);
                hoverExpandTimeout = null;
            }
        }

        // Drag and Drop with SortableJS - handles sibling reordering only
        function initDragAndDrop() {
            // Initialize Sortable on each children container for sibling reordering
            document.querySelectorAll('.children').forEach(container => {
                const parentId = container.dataset.childrenOf ? parseInt(container.dataset.childrenOf) : null;

                const sortable = new Sortable(container, {
                    group: {
                        name: 'nested',
                        pull: false,  // Disable pulling - reparenting is done via HTML5 DnD
                        put: false    // Disable putting - reparenting is done via HTML5 DnD
                    },
                    animation: 200,
                    handle: '.drag-handle',
                    ghostClass: 'sortable-ghost',
                    dragClass: 'sortable-drag',
                    onStart: function(evt) {
                        evt.item.closest('.node-card').classList.add('dragging');
                    },
                    onEnd: function(evt) {
                        const card = evt.item.closest('.node-card');
                        if (card) card.classList.remove('dragging');

                        const nodeId = parseInt(evt.item.dataset.childId);
                        const newParentId = evt.to.dataset.childrenOf ? parseInt(evt.to.dataset.childrenOf) : null;

                        // Only handle reordering within the same parent
                        if (nodeId && newParentId !== undefined) {
                            const node = people.find(p => p.id === nodeId);
                            if (node) {
                                // Reorder siblings based on DOM order
                                const newOrder = Array.from(evt.to.children).map(child =>
                                    parseInt(child.dataset.childId)
                                );

                                // Persist sibling order in the backing array
                                const siblings = people.filter(p => p.reportsTo === newParentId);
                                const siblingsById = new Map(siblings.map(s => [s.id, s]));
                                const orderedSiblings = newOrder
                                    .map(id => siblingsById.get(id))
                                    .filter(Boolean);
                                const orderedIds = new Set(orderedSiblings.map(s => s.id));
                                siblings.forEach(s => {
                                    if (!orderedIds.has(s.id)) orderedSiblings.push(s);
                                });

                                let siblingIndex = 0;
                                people = people.map(person => {
                                    if (person.reportsTo === newParentId) {
                                        const nextSibling = orderedSiblings[siblingIndex++];
                                        return nextSibling || person;
                                    }
                                    return person;
                                });

                                saveData();
                                // Don't re-render to preserve the new order visually
                            }
                        }
                    }
                });

                sortableInstances.push(sortable);
            });
        }

        // Drag to Reparent functionality
        let draggedNodeId = null;
        let draggedNodeData = null;
        let dragSourceElement = null;

        function getAllDescendantIds(nodeId) {
            const descendants = [];
            const children = people.filter(p => p.reportsTo === nodeId);
            for (const child of children) {
                descendants.push(child.id);
                descendants.push(...getAllDescendantIds(child.id));
            }
            return descendants;
        }

        function canReparent(nodeId, targetId) {
            // Can't drop on itself
            if (nodeId === targetId) return false;
            // Can't drop on its own descendants (would create cycle)
            if (isDescendant(nodeId, targetId)) return false;
            // Get current parent
            const node = people.find(p => p.id === nodeId);
            if (!node) return false;
            // Can't drop on same parent (that's reordering, handled by SortableJS)
            if (node.reportsTo === targetId) return false;
            return true;
        }

        function handleDragStart(event, nodeId) {
            event.stopPropagation();
            draggedNodeId = nodeId;
            draggedNodeData = people.find(p => p.id === nodeId);
            dragSourceElement = event.target.closest('.node-card');

            event.dataTransfer.effectAllowed = 'move';
            event.dataTransfer.setData('text/plain', nodeId);

            // Add global dragging state
            document.body.classList.add('reparent-dragging');
            document.getElementById('orgTree').classList.add('reparent-drag-active');

            // Get all descendant IDs for invalid targeting
            const descendantIds = getAllDescendantIds(nodeId);

            // Mark all cards with appropriate classes
            document.querySelectorAll('.node-card').forEach(card => {
                const cardNodeId = parseInt(card.closest('[data-node-id]').dataset.nodeId);

                if (cardNodeId === nodeId) {
                    // The source node being dragged
                    card.classList.add('drag-source');
                } else if (descendantIds.includes(cardNodeId)) {
                    // Can't drop on descendants
                    card.classList.add('invalid-drop-target');
                } else if (!canReparent(nodeId, cardNodeId)) {
                    // Other invalid targets (same parent, etc)
                    card.classList.add('invalid-drop-target');
                } else {
                    // Valid drop target
                    card.classList.add('valid-drop-target');
                }
            });

            // Set custom drag image if possible
            if (dragSourceElement) {
                const rect = dragSourceElement.getBoundingClientRect();
                event.dataTransfer.setDragImage(dragSourceElement, event.clientX - rect.left, event.clientY - rect.top);
            }
        }

        function clearDragState() {
            document.body.classList.remove('reparent-dragging');
            document.getElementById('orgTree').classList.remove('reparent-drag-active');
            document.querySelectorAll('.node-card').forEach(card => {
                card.classList.remove('drag-source', 'valid-drop-target', 'invalid-drop-target', 'drag-over-valid', 'drag-over-invalid');
            });
            draggedNodeId = null;
            draggedNodeData = null;
            dragSourceElement = null;
        }

        // Global dragover handler for drop target highlighting
        document.addEventListener('dragover', function(e) {
            if (!draggedNodeId) return;

            const card = e.target.closest('.node-card');
            if (!card) return;

            // Don't allow dropping on the drag handle itself
            if (e.target.closest('.drag-handle')) return;

            const targetNodeId = parseInt(card.closest('[data-node-id]').dataset.nodeId);

            // Check if this is a valid drop
            if (canReparent(draggedNodeId, targetNodeId)) {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                card.classList.add('drag-over-valid');
                card.classList.remove('drag-over-invalid');
            } else {
                e.dataTransfer.dropEffect = 'none';
                card.classList.add('drag-over-invalid');
                card.classList.remove('drag-over-valid');
            }
        });

        document.addEventListener('dragleave', function(e) {
            const card = e.target.closest('.node-card');
            if (card) {
                card.classList.remove('drag-over-valid', 'drag-over-invalid');
            }
        });

        document.addEventListener('drop', function(e) {
            if (!draggedNodeId) return;

            const card = e.target.closest('.node-card');
            if (card) {
                const targetNodeId = parseInt(card.closest('[data-node-id]').dataset.nodeId);

                if (canReparent(draggedNodeId, targetNodeId)) {
                    e.preventDefault();
                    e.stopPropagation();

                    // Perform the reparenting
                    const node = people.find(p => p.id === draggedNodeId);
                    if (node) {
                        const oldParent = node.reportsTo;
                        node.reportsTo = targetNodeId;
                        saveData();
                        renderTree();

                        // Show feedback (optional - could add toast notification here)
                        console.log(`Moved ${node.name} to report to ${people.find(p => p.id === targetNodeId)?.name || 'root'}`);
                    }
                }
            }

            clearDragState();
        });

        // Clear state on drag end (handles case where drop doesn't occur)
        document.addEventListener('dragend', function(e) {
            if (draggedNodeId) {
                clearDragState();
            }
        });

        function updateTypeSelect() {
            const select = document.getElementById('type');
            select.innerHTML = roleTypes.map(rt => `<option value="${rt.id}">${rt.name}</option>`).join('');
        }

        function updateReportsToOptions() {
            const select = document.getElementById('reportsTo');
            const currentId = editingId;
            let html = '<option value="">None (Top Level)</option>';
            people.forEach(p => {
                if (p.id !== currentId && !isDescendant(currentId, p.id)) {
                    html += `<option value="${p.id}">${p.name} - ${p.role}</option>`;
                }
            });
            select.innerHTML = html;
        }

        function isDescendant(parentId, childId) {
            if (!parentId) return false;
            const children = people.filter(p => p.reportsTo === parentId);
            for (const child of children) {
                if (child.id === childId || isDescendant(child.id, childId)) return true;
            }
            return false;
        }

        function renderRoleTypes() {
            const container = document.getElementById('roleTypesList');
            container.innerHTML = roleTypes.map((rt, idx) => `
                <div class="role-type-item">
                    <input type="color" value="${rt.color}" onchange="updateRoleTypeColor(${idx}, this.value)">
                    <input type="text" value="${rt.name}" onchange="updateRoleTypeName(${idx}, this.value)" placeholder="Type name">
                    <button class="icon-btn delete" onclick="removeRoleType(${idx})">✕</button>
                </div>
            `).join('');
            updateTypeSelect();
        }

        function addRoleType() {
            const newId = 'type_' + Date.now();
            roleTypes.push({ id: newId, name: 'New Type', color: '#64748b' });
            saveData();
            renderRoleTypes();
        }

        function updateRoleTypeColor(idx, color) { roleTypes[idx].color = color; saveData(); renderTree(); }
        function updateRoleTypeName(idx, name) { roleTypes[idx].name = name; saveData(); renderTree(); renderLegend(); }

        function removeRoleType(idx) {
            if (roleTypes.length <= 1) { alert('You need at least one role type'); return; }
            const removedType = roleTypes[idx];
            roleTypes.splice(idx, 1);
            people.forEach(p => { if (p.type === removedType.id) p.type = roleTypes[0].id; });
            saveData(); renderRoleTypes(); renderList(); renderTree();
        }

        function renderList() {
            const container = document.getElementById('personList');
            if (people.length === 0) {
                container.innerHTML = `<div class="empty-state"><h3>No people added yet</h3></div>`;
                return;
            }
            container.innerHTML = people.map(p => {
                const reportsTo = people.find(x => x.id === p.reportsTo);
                const type = roleTypes.find(rt => rt.id === p.type);
                return `
                    <div class="person-item ${editingId === p.id ? 'selected' : ''}" onclick="editPerson(${p.id})">
                        <div class="person-info">
                            <h3>${p.name}</h3>
                            <p>${p.role}${p.domain ? ` • ${p.domain}` : ''}${reportsTo ? ` → reports to ${reportsTo.name}` : ''}</p>
                        </div>
                        <div class="person-actions">
                            <span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:${type?.color || '#3b82f6'};margin-right:8px;"></span>
                            <button class="icon-btn" onclick="event.stopPropagation(); editPerson(${p.id})">✎</button>
                            <button class="icon-btn delete" onclick="event.stopPropagation(); confirmDelete(${p.id})">✕</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        document.getElementById('personForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const personData = {
                id: editingId || Date.now(),
                name: document.getElementById('name').value,
                role: document.getElementById('role').value,
                domain: document.getElementById('domain').value,
                reportsTo: document.getElementById('reportsTo').value ? parseInt(document.getElementById('reportsTo').value) : null,
                type: document.getElementById('type').value,
                accountabilities: document.getElementById('accountabilities').value,
                decisions: document.getElementById('decisions').value
            };
            if (editingId) {
                const idx = people.findIndex(p => p.id === editingId);
                people[idx] = personData;
            } else {
                people.push(personData);
            }
            saveData(); resetForm(); renderList(); updateReportsToOptions();
        });

        function editPerson(id) {
            editingId = id;
            const person = people.find(p => p.id === id);
            document.getElementById('formTitle').textContent = 'Edit Person';
            document.getElementById('personId').value = person.id;
            document.getElementById('name').value = person.name;
            document.getElementById('role').value = person.role;
            document.getElementById('domain').value = person.domain || '';
            document.getElementById('type').value = person.type || roleTypes[0].id;
            document.getElementById('accountabilities').value = person.accountabilities || '';
            document.getElementById('decisions').value = person.decisions || '';
            document.getElementById('deleteBtn').style.display = 'block';
            updateReportsToOptions();
            document.getElementById('reportsTo').value = person.reportsTo || '';
            renderList();
        }

        function selectPerson(id) { showView('edit'); editPerson(id); }

        function resetForm() {
            editingId = null;
            document.getElementById('formTitle').textContent = 'Add Person';
            document.getElementById('personForm').reset();
            document.getElementById('deleteBtn').style.display = 'none';
            updateReportsToOptions(); renderList();
        }

        function confirmDelete(id) {
            if (confirm('Delete this person? Any people reporting to them will become top-level.')) {
                people.forEach(p => { if (p.reportsTo === id) p.reportsTo = null; });
                people = people.filter(p => p.id !== id);
                collapsedNodes.delete(id);
                saveData(); resetForm(); renderList();
            }
        }

        function deletePerson() { if (editingId) confirmDelete(editingId); }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.className = 'export-notification';
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => {
                notification.style.opacity = '0';
                notification.style.transform = 'translateX(100%)';
                setTimeout(() => document.body.removeChild(notification), 300);
            }, 2000);
        }

        function printChart() {
            // Switch to chart view if not already there
            showView('chart');
            // Small delay to ensure rendering is complete
            setTimeout(() => {
                window.print();
            }, 100);
        }

        async function exportPNG() {
            // Make sure we're in chart view
            showView('chart');

            const treeContainer = document.getElementById('orgTree');
            if (!treeContainer) {
                alert('No chart to export');
                return;
            }

            // Show loading notification
            showNotification('Generating PNG...');

            try {
                // Get computed styles for line colors
                const lineColor = getComputedStyle(document.body).getPropertyValue('--line-color').trim() || '#d4d4d8';
                const bgColor = getComputedStyle(document.body).getPropertyValue('--bg-primary').trim() || '#fafafa';

                // Get the actual tree content
                const treeEl = document.getElementById('treeContainer');
                const actualTree = treeEl || treeContainer;

                // Create a cloned container for capture to avoid overflow issues
                const cloneContainer = document.createElement('div');
                cloneContainer.style.cssText = `
                    position: absolute;
                    left: -9999px;
                    top: 0;
                    background: ${bgColor};
                    padding: 40px;
                    overflow: visible;
                `;

                // Clone the tree and reset its transform
                const clonedTree = actualTree.cloneNode(true);
                clonedTree.style.transform = 'none';
                clonedTree.style.position = 'relative';

                // Fix connection lines in clone - set explicit background colors
                const lineSelectors = ['.horizontal-line-right', '.vertical-connector', '.children-spine', '.vertical-line-to-child'];
                lineSelectors.forEach(selector => {
                    clonedTree.querySelectorAll(selector).forEach(el => {
                        el.style.background = lineColor;
                    });
                });

                // Add legend to the clone
                const legend = document.getElementById('legend');
                if (legend && legend.innerHTML.trim()) {
                    const clonedLegend = legend.cloneNode(true);
                    clonedLegend.style.cssText = 'margin-bottom: 30px; display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;';
                    cloneContainer.appendChild(clonedLegend);
                }

                cloneContainer.appendChild(clonedTree);
                document.body.appendChild(cloneContainer);

                // Calculate the full bounds of the cloned tree
                const fullWidth = clonedTree.scrollWidth + 80; // +padding
                const fullHeight = clonedTree.scrollHeight + (legend ? 80 : 40);

                // Capture the clone with full dimensions
                const canvas = await html2canvas(cloneContainer, {
                    backgroundColor: bgColor,
                    scale: 2,
                    useCORS: true,
                    allowTaint: true,
                    logging: false,
                    width: fullWidth,
                    height: fullHeight,
                    x: 0,
                    y: 0,
                    scrollX: 0,
                    scrollY: 0,
                    windowWidth: fullWidth,
                    windowHeight: fullHeight
                });

                // Clean up the clone
                document.body.removeChild(cloneContainer);

                // Convert to PNG and download
                const pngUrl = canvas.toDataURL('image/png');
                const date = new Date().toISOString().split('T')[0];
                const safeName = companyName.replace(/[^a-z0-9]/gi, '_').toLowerCase();

                const link = document.createElement('a');
                link.download = `${safeName}_org_chart_${date}.png`;
                link.href = pngUrl;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                showNotification('PNG exported successfully!');
            } catch (err) {
                console.error('Export failed:', err);
                alert('Failed to export PNG. Please try again.');
            }
        }

        function exportData() {
            const data = { 
                version: '2.0', 
                exportedAt: new Date().toISOString(), 
                companyName: companyName, 
                roleTypes: roleTypes, 
                people: people,
                collapsedNodes: [...collapsedNodes]
            };
            const json = JSON.stringify(data, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const date = new Date().toISOString().split('T')[0];
            const safeName = companyName.replace(/[^a-z0-9]/gi, '_').toLowerCase();
            const a = document.createElement('a');
            a.href = url;
            a.download = `${safeName}_org_chart_${date}.json`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        }

        function importData(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!data.people) throw new Error('Invalid format');
                    if (people.length > 0 && !confirm('Replace current data?')) return;
                    companyName = data.companyName || 'Organization';
                    roleTypes = data.roleTypes || defaultRoleTypes;
                    people = data.people;
                    if (data.collapsedNodes) {
                        collapsedNodes = new Set(data.collapsedNodes);
                    }
                    saveData(); init();
                } catch (err) { alert('Error: ' + err.message); }
                input.value = '';
            };
            reader.readAsText(file);
        }

        init();
    </script>
