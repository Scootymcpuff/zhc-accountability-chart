<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accountability Chart</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Light mode (default) */
            --bg-primary: #fafafa;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f4f4f5;
            --border-color: #e4e4e7;
            --border-light: #f1f1f2;
            --text-primary: #18181b;
            --text-secondary: #52525b;
            --text-tertiary: #71717a;
            --accent-blue: #3b82f6;
            --accent-blue-light: #eff6ff;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --line-color: #d4d4d8;
            --line-active: #a1a1aa;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --transition-speed: 0.3s;
        }

        /* Dark mode */
        [data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --border-color: #475569;
            --border-light: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-tertiary: #94a3b8;
            --accent-blue: #60a5fa;
            --accent-blue-light: #1e3a5f;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.3);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.4), 0 2px 4px -2px rgb(0 0 0 / 0.4);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.5), 0 4px 6px -4px rgb(0 0 0 / 0.5);
            --line-color: #475569;
            --line-active: #64748b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
            transition: background-color var(--transition-speed), color var(--transition-speed);
        }

        .header {
            background: var(--bg-secondary);
            padding: 12px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            transition: background-color var(--transition-speed), border-color var(--transition-speed);
        }

        .header-left {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .company-name {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);
            background: transparent;
            border: none;
            padding: 0;
            font-family: inherit;
            width: auto;
            min-width: 200px;
            transition: color var(--transition-speed);
        }

        .company-name:hover, .company-name:focus {
            background: var(--bg-tertiary);
            border-radius: var(--radius-sm);
            padding: 4px 8px;
            margin: -4px -8px;
            outline: none;
        }

        .header span {
            color: var(--text-tertiary);
            font-size: 13px;
            transition: color var(--transition-speed);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .file-actions, .export-actions {
            display: flex;
            gap: 8px;
        }

        .file-btn {
            padding: 8px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }

        .file-btn:hover {
            background: var(--bg-tertiary);
            border-color: var(--line-active);
            color: var(--text-primary);
        }

        .file-btn svg {
            width: 14px;
            height: 14px;
        }

        .tabs {
            display: flex;
            gap: 4px;
            background: var(--bg-tertiary);
            padding: 4px;
            border-radius: var(--radius-md);
            transition: background-color var(--transition-speed);
        }

        .tab {
            padding: 8px 16px;
            background: transparent;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            color: var(--text-tertiary);
            font-weight: 500;
        }

        .tab:hover {
            color: var(--text-primary);
        }

        .tab.active {
            background: var(--bg-secondary);
            color: var(--text-primary);
            box-shadow: var(--shadow-sm);
        }

        /* Theme Toggle */
        .theme-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 6px 12px;
            background: var(--bg-tertiary);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            border-color: var(--line-active);
        }

        .theme-toggle input {
            display: none;
        }

        .theme-slider {
            width: 44px;
            height: 24px;
            background: var(--border-color);
            border-radius: 24px;
            position: relative;
            transition: background 0.3s;
        }

        .theme-slider::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.3s;
            box-shadow: var(--shadow-sm);
            display
