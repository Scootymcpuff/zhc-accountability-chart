<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZHC Accountability Chart</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 20px 30px;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            color: #f8fafc;
        }

        .header span {
            color: #64748b;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            gap: 10px;
        }

        .tab {
            padding: 10px 20px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            color: #94a3b8;
        }

        .tab:hover {
            background: #334155;
        }

        .tab.active {
            background: #3b82f6;
            border-color: #3b82f6;
            color: white;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }

        /* Chart View */
        .chart-view {
            display: none;
        }

        .chart-view.active {
            display: block;
        }

        .org-tree {
            display: flex;
            justify-content: center;
            padding: 40px;
            overflow-x: auto;
        }

        .tree-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .node-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 2px solid #3b82f6;
            border-radius: 12px;
            padding: 16px 24px;
            min-width: 200px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            z-index: 2;
        }

        .node-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 40px rgba(59, 130, 246, 0.3);
            border-color: #60a5fa;
        }

        .node-card.chairman {
            border-color: #f59e0b;
            background: linear-gradient(135deg, #451a03 0%, #1e293b 100%);
        }

        .node-card.chairman:hover {
            box-shadow: 0 10px 40px rgba(245, 158, 11, 0.3);
        }

        .node-card.ai-agent {
            border-color: #10b981;
            background: linear-gradient(135deg, #064e3b 0%, #1e293b 100%);
        }

        .node-card.ai-agent:hover {
            box-shadow: 0 10px 40px rgba(16, 185, 129, 0.3);
        }

        .node-name {
            font-size: 16px;
            font-weight: 600;
            color: #f8fafc;
            margin-bottom: 4px;
        }

        .node-role {
            font-size: 13px;
            color: #94a3b8;
        }

        .node-domain {
            font-size: 11px;
            color: #64748b;
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px solid #334155;
        }

        .children {
            display: flex;
            gap: 40px;
            margin-top: 60px;
            position: relative;
        }

        .children::before {
            content: '';
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 30px;
            background: #475569;
        }

        .child-wrapper {
            position: relative;
        }

        .child-wrapper::before {
            content: '';
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 30px;
            background: #475569;
        }

        .children > .child-wrapper:not(:only-child)::after {
            content: '';
            position: absolute;
            top: -30px;
            left: 50%;
            width: 100%;
            height: 2px;
            background: #475569;
            transform: translateX(-50%);
        }

        .children > .child-wrapper:first-child:not(:only-child)::after {
            left: 50%;
            width: 50%;
        }

        .children > .child-wrapper:last-child:not(:only-child)::after {
            left: 0;
            width: 50%;
        }

        /* Edit View */
        .edit-view {
            display: none;
        }

        .edit-view.active {
            display: block;
        }

        .edit-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 30px;
        }

        .form-panel {
            background: #1e293b;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #334155;
            height: fit-content;
            position: sticky;
            top: 30px;
        }

        .form-panel h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #f8fafc;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-top: 8px;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        .btn-secondary {
            background: #334155;
            color: #e2e8f0;
        }

        .btn-secondary:hover {
            background: #475569;
        }

        .btn-danger {
            background: #dc2626;
            color: white;
        }

        .btn-danger:hover {
            background: #b91c1c;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .btn-group .btn {
            flex: 1;
        }

        /* List Panel */
        .list-panel {
            background: #1e293b;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #334155;
        }

        .list-panel h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #f8fafc;
        }

        .person-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .person-item {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .person-item:hover {
            border-color: #3b82f6;
        }

        .person-item.selected {
            border-color: #3b82f6;
            background: #1e3a5f;
        }

        .person-info h3 {
            font-size: 15px;
            color: #f8fafc;
            margin-bottom: 4px;
        }

        .person-info p {
            font-size: 13px;
            color: #64748b;
        }

        .person-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 6px;
            background: #334155;
            color: #94a3b8;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background: #3b82f6;
            color: white;
        }

        .icon-btn.delete:hover {
            background: #dc2626;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }

        .empty-state h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: #94a3b8;
        }

        /* Legend */
        .legend {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #94a3b8;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        .legend-dot.chairman {
            background: #f59e0b;
        }

        .legend-dot.ai {
            background: #10b981;
        }

        .legend-dot.human {
            background: #3b82f6;
        }

        @media (max-width: 900px) {
            .edit-layout {
                grid-template-columns: 1fr;
            }

            .form-panel {
                position: static;
            }

            .children {
                flex-direction: column;
                align-items: center;
                gap: 30px;
            }

            .child-wrapper::before,
            .children::before,
            .children > .child-wrapper::after {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>⚡ ZHC Accountability Chart</h1>
            <span>Zero Human Company Organizational Structure</span>
        </div>
        <div class="tabs">
            <button class="tab active" onclick="showView('chart')">Chart View</button>
            <button class="tab" onclick="showView('edit')">Edit People</button>
        </div>
    </div>

    <div class="container">
        <!-- Chart View -->
        <div id="chartView" class="chart-view active">
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-dot chairman"></div>
                    <span>Chairman (Human)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot ai"></div>
                    <span>AI Agent</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot human"></div>
                    <span>Human Team</span>
                </div>
            </div>
            <div id="orgTree" class="org-tree">
                <!-- Tree will be rendered here -->
            </div>
        </div>

        <!-- Edit View -->
        <div id="editView" class="edit-view">
            <div class="edit-layout">
                <div class="form-panel">
                    <h2 id="formTitle">Add Person</h2>
                    <form id="personForm">
                        <input type="hidden" id="personId">
                        <div class="form-group">
                            <label>Name</label>
                            <input type="text" id="name" placeholder="e.g., John Smith" required>
                        </div>
                        <div class="form-group">
                            <label>Role / Title</label>
                            <input type="text" id="role" placeholder="e.g., Operations Manager" required>
                        </div>
                        <div class="form-group">
                            <label>Domain / Function</label>
                            <input type="text" id="domain" placeholder="e.g., Operations">
                        </div>
                        <div class="form-group">
                            <label>Reports To</label>
                            <select id="reportsTo">
                                <option value="">None (Top Level)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Type</label>
                            <select id="type">
                                <option value="human">Human</option>
                                <option value="ai-agent">AI Agent</option>
                                <option value="chairman">Chairman</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Key Accountabilities</label>
                            <textarea id="accountabilities" placeholder="What this role is responsible for..."></textarea>
                        </div>
                        <div class="form-group">
                            <label>Decision Rights</label>
                            <textarea id="decisions" placeholder="What decisions can this role make..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Save Person</button>
                        <button type="button" class="btn btn-secondary" onclick="resetForm()">Clear Form</button>
                        <button type="button" id="deleteBtn" class="btn btn-danger" style="display: none; margin-top: 10px;" onclick="deletePerson()">Delete Person</button>
                    </form>
                </div>

                <div class="list-panel">
                    <h2>People</h2>
                    <div id="personList" class="person-list">
                        <!-- List will be rendered here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Data storage
        let people = JSON.parse(localStorage.getItem('zhc_org_chart')) || [
            { id: 1, name: "Nathaniel Hubbard", role: "Chairman", domain: "Governance", reportsTo: null, type: "chairman", accountabilities: "Strategic direction; final authority", decisions: "All major decisions" },
            { id: 2, name: "Belisarius", role: "CEO", domain: "Executive", reportsTo: 1, type: "ai-agent", accountabilities: "Strategy execution; operations oversight", decisions: "Day-to-day operations; hiring" },
            { id: 3, name: "Ghost", role: "CFO/COO", domain: "Finance/Operations", reportsTo: 2, type: "ai-agent", accountabilities: "Financial management; operational efficiency", decisions: "Budget approval; vendor selection" },
            { id: 4, name: "Ironhide", role: "Maintenance Ops Lead", domain: "Maintenance", reportsTo: 3, type: "ai-agent", accountabilities: "Equipment maintenance; field operations", decisions: "Maintenance scheduling; parts procurement" }
        ];

        let editingId = null;

        // Save to localStorage
        function saveData() {
            localStorage.setItem('zhc_org_chart', JSON.stringify(people));
        }

        // Show different views
        function showView(view) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.chart-view, .edit-view').forEach(v => v.classList.remove('active'));
            
            if (view === 'chart') {
                document.getElementById('chartView').classList.add('active');
                document.querySelectorAll('.tab')[0].classList.add('active');
                renderTree();
            } else {
                document.getElementById('editView').classList.add('active');
                document.querySelectorAll('.tab')[1].classList.add('active');
                renderList();
                updateReportsToOptions();
            }
        }

        // Build tree structure
        function buildTree() {
            const root = people.filter(p => !p.reportsTo);
            
            function addChildren(parent) {
                const children = people.filter(p => p.reportsTo === parent.id);
                return {
                    ...parent,
                    children: children.map(addChildren)
                };
            }
            
            return root.map(addChildren);
        }

        // Render tree recursively
        function renderTreeNode(node) {
            const hasChildren = node.children && node.children.length > 0;
            
            let html = `
                <div class="tree-node">
                    <div class="node-card ${node.type}" onclick="selectPerson(${node.id})">
                        <div class="node-name">${node.name}</div>
                        <div class="node-role">${node.role}</div>
                        ${node.domain ? `<div class="node-domain">${node.domain}</div>` : ''}
                    </div>
            `;
            
            if (hasChildren) {
                html += '<div class="children">';
                node.children.forEach(child => {
                    html += `<div class="child-wrapper">${renderTreeNode(child)}</div>`;
                });
                html += '</div>';
            }
            
            html += '</div>';
            return html;
        }

        // Render org tree
        function renderTree() {
            const tree = buildTree();
            const container = document.getElementById('orgTree');
            
            if (tree.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>No people added yet</h3>
                        <p>Switch to Edit People to add your team</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = tree.map(renderTreeNode).join('');
        }

        // Update reports-to dropdown
        function updateReportsToOptions() {
            const select = document.getElementById('reportsTo');
            const currentId = editingId;
            
            let html = '<option value="">None (Top Level)</option>';
            people.forEach(p => {
                // Don't allow reporting to self or descendants (would create cycle)
                if (p.id !== currentId && !isDescendant(currentId, p.id)) {
                    html += `<option value="${p.id}">${p.name} - ${p.role}</option>`;
                }
            });
            select.innerHTML = html;
        }

        // Check if person is descendant of another
        function isDescendant(parentId, childId) {
            if (!parentId) return false;
            const children = people.filter(p => p.reportsTo === parentId);
            for (const child of children) {
                if (child.id === childId) return true;
                if (isDescendant(child.id, childId)) return true;
            }
            return false;
        }

        // Render person list
        function renderList() {
            const container = document.getElementById('personList');
            
            if (people.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>No people added yet</h3>
                        <p>Use the form to add your first person</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = people.map(p => {
                const reportsTo = people.find(x => x.id === p.reportsTo);
                return `
                    <div class="person-item ${editingId === p.id ? 'selected' : ''}" onclick="editPerson(${p.id})">
                        <div class="person-info">
                            <h3>${p.name}</h3>
                            <p>${p.role}${p.domain ? ` • ${p.domain}` : ''}${reportsTo ? ` → reports to ${reportsTo.name}` : ''}</p>
                        </div>
                        <div class="person-actions">
                            <button class="icon-btn" onclick="event.stopPropagation(); editPerson(${p.id})">✎</button>
                            <button class="icon-btn delete" onclick="event.stopPropagation(); confirmDelete(${p.id})">✕</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Form submission
        document.getElementById('personForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const personData = {
                id: editingId || Date.now(),
                name: document.getElementById('name').value,
                role: document.getElementById('role').value,
                domain: document.getElementById('domain').value,
                reportsTo: document.getElementById('reportsTo').value ? parseInt(document.getElementById('reportsTo').value) : null,
                type: document.getElementById('type').value,
                accountabilities: document.getElementById('accountabilities').value,
                decisions: document.getElementById('decisions').value
            };
            
            if (editingId) {
                const idx = people.findIndex(p => p.id === editingId);
                people[idx] = personData;
            } else {
                people.push(personData);
            }
            
            saveData();
            resetForm();
            renderList();
            updateReportsToOptions();
        });

        // Edit person
        function editPerson(id) {
            editingId = id;
            const person = people.find(p => p.id === id);
            
            document.getElementById('formTitle').textContent = 'Edit Person';
            document.getElementById('personId').value = person.id;
            document.getElementById('name').value = person.name;
            document.getElementById('role').value = person.role;
            document.getElementById('domain').value = person.domain || '';
            document.getElementById('reportsTo').value = person.reportsTo || '';
            document.getElementById('type').value = person.type || 'human';
            document.getElementById('accountabilities').value = person.accountabilities || '';
            document.getElementById('decisions').value = person.decisions || '';
            document.getElementById('deleteBtn').style.display = 'block';
            
            updateReportsToOptions();
            renderList();
        }

        // Select from chart
        function selectPerson(id) {
            showView('edit');
            editPerson(id);
        }

        // Reset form
        function resetForm() {
            editingId = null;
            document.getElementById('formTitle').textContent = 'Add Person';
            document.getElementById('personForm').reset();
            document.getElementById('deleteBtn').style.display = 'none';
            updateReportsToOptions();
            renderList();
        }

        // Confirm delete
        function confirmDelete(id) {
            if (confirm('Delete this person? Any people reporting to them will become top-level.')) {
                // Reassign children to top level
                people.forEach(p => {
                    if (p.reportsTo === id) {
                        p.reportsTo = null;
                    }
                });
                
                people = people.filter(p => p.id !== id);
                saveData();
                resetForm();
                renderList();
            }
        }

        // Delete person
        function deletePerson() {
            if (editingId) {
                confirmDelete(editingId);
            }
        }

        // Initial render
        renderTree();
    </script>
</body>
</html>
