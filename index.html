<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizational Accountability Chart</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            overflow: hidden;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
        }

        .company-name {
            font-size: 24px;
            font-weight: 700;
            color: #f8fafc;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .company-name:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .main-container {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
        }

        .chart-container {
            width: 100%;
            height: 100%;
            cursor: grab;
            position: relative;
        }

        .chart-container:active {
            cursor: grabbing;
        }

        .chart-content {
            position: absolute;
            transform-origin: center top;
            padding: 80px;
            min-width: 100%;
            min-height: 100%;
        }

        /* Tree Structure */
        .org-tree {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .node-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Card Styling */
        .person-card {
            background: #1e293b;
            border: 2px solid;
            border-radius: 12px;
            padding: 16px 20px;
            min-width: 220px;
            max-width: 280px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            z-index: 10;
        }

        .person-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .person-card.selected {
            box-shadow: 0 0 0 3px #3b82f6, 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .card-header {
            margin-bottom: 8px;
        }

        .person-name {
            font-size: 16px;
            font-weight: 600;
            color: #f8fafc;
            margin-bottom: 2px;
        }

        .person-role {
            font-size: 13px;
            color: #94a3b8;
        }

        .card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 8px;
        }

        .meta-tag {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.1);
            color: #cbd5e1;
        }

        /* Tree Lines - Clean Implementation */
        .children-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            padding-top: 40px;
            position: relative;
        }

        /* Parent vertical line (goes down 20px from parent) */
        .parent-line {
            width: 2px;
            height: 20px;
            background: #64748b;
            margin: 0 auto;
        }

        /* Children wrapper with connection logic */
        .child-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Child vertical line (goes up 20px to meet parent line) */
        .child-line {
            width: 2px;
            height: 20px;
            background: #64748b;
        }

        /* Horizontal bar connecting multiple children */
        .children-horizontal-line {
            position: absolute;
            top: 20px;
            height: 2px;
            background: #64748b;
        }

        /* Single child - no horizontal line, just direct connection */
        .single-child .children-horizontal-line {
            display: none;
        }

        /* Zoom Controls */
        .zoom-controls {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 100;
            background: rgba(30, 41, 59, 0.95);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .zoom-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .zoom-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .zoom-level {
            text-align: center;
            font-size: 12px;
            color: #94a3b8;
            padding: 4px 0;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            top: 60px;
            right: -420px;
            width: 400px;
            height: calc(100vh - 60px);
            background: #1e293b;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            transition: right 0.3s ease;
            z-index: 90;
            overflow-y: auto;
            padding: 24px;
        }

        .sidebar.open {
            right: 0;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .sidebar-title {
            font-size: 20px;
            font-weight: 600;
        }

        .close-btn {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 24px;
            cursor: pointer;
            padding: 4px;
        }

        .close-btn:hover {
            color: #e2e8f0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #94a3b8;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 12px 14px;
            background: #0f172a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 14px;
            transition: all 0.2s;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .form-textarea {
            min-height: 80px;
            resize: vertical;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .form-actions .btn {
            flex: 1;
        }

        /* Role Types Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: #1e293b;
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }

        .modal-body {
            padding: 24px;
            overflow-y: auto;
            max-height: 50vh;
        }

        .role-type-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .role-type-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #0f172a;
            border-radius: 8px;
        }

        .color-picker {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .role-type-input {
            flex: 1;
            padding: 10px 12px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: #e2e8f0;
            font-size: 14px;
        }

        .role-delete {
            background: none;
            border: none;
            color: #ef4444;
            font-size: 20px;
            cursor: pointer;
            padding: 4px 8px;
        }

        .add-role-btn {
            width: 100%;
            padding: 12px;
            background: rgba(59, 130, 246, 0.2);
            border: 1px dashed #3b82f6;
            border-radius: 8px;
            color: #3b82f6;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .add-role-btn:hover {
            background: rgba(59, 130, 246, 0.3);
        }

        .modal-footer {
            padding: 20px 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state h3 {
            font-size: 20px;
            margin-bottom: 12px;
            color: #f8fafc;
        }

        .empty-state p {
            color: #94a3b8;
            margin-bottom: 24px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0f172a;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="company-name" id="companyName" contenteditable="true" spellcheck="false">ACME Corporation</div>
        <div class="header-actions">
            <input type="file" id="importFile" accept=".json" style="display: none;">
            <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()">
                📥 Import
            </button>
            <button class="btn btn-secondary" onclick="exportData()">
                📤 Export
            </button>
            <button class="btn btn-secondary" onclick="openRoleTypesModal()">
                🎨 Role Types
            </button>
            <button class="btn btn-primary" onclick="addNewPerson()">
                + Add Person
            </button>
        </div>
    </div>

    <div class="main-container">
        <div class="chart-container" id="chartContainer">
            <div class="chart-content" id="chartContent">
                <div id="orgChart"></div>
            </div>
        </div>
    </div>

    <div class="zoom-controls">
        <button class="zoom-btn" onclick="zoomIn()">+</button>
        <div class="zoom-level" id="zoomLevel">100%</div>
        <button class="zoom-btn" onclick="zoomOut()">−</button>
        <button class="zoom-btn" onclick="resetZoom()">⟲</button>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3 class="sidebar-title" id="sidebarTitle">Edit Person</h3>
            <button class="close-btn" onclick="closeSidebar()">×</button>
        </div>
        <form id="personForm" onsubmit="savePerson(event)">
            <input type="hidden" id="personId">
            <div class="form-group">
                <label class="form-label">Name</label>
                <input type="text" class="form-input" id="personName" required>
            </div>
            <div class="form-group">
                <label class="form-label">Role</label>
                <input type="text" class="form-input" id="personRole" required>
            </div>
            <div class="form-group">
                <label class="form-label">Domain</label>
                <input type="text" class="form-input" id="personDomain" placeholder="e.g., Finance, Operations">
            </div>
            <div class="form-group">
                <label class="form-label">Reports To</label>
                <select class="form-select" id="personReportsTo">
                    <option value="">None (Top Level)</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Type</label>
                <select class="form-select" id="personType">
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Accountabilities</label>
                <textarea class="form-textarea" id="personAccountabilities" placeholder="List key accountabilities..."></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">Decision Rights</label>
                <textarea class="form-textarea" id="personDecisionRights" placeholder="List decision-making authority..."></textarea>
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-danger" id="deleteBtn" onclick="deletePerson()">Delete</button>
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
    </div>

    <div class="modal-overlay" id="roleTypesModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Role Types</h3>
                <button class="close-btn" onclick="closeRoleTypesModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="role-type-list" id="roleTypeList"></div>
                <button class="add-role-btn" onclick="addRoleType()" style="margin-top: 16px;">+ Add Role Type</button>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeRoleTypesModal()">Close</button>
                <button class="btn btn-primary" onclick="saveRoleTypes()">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        // State
        let state = {
            companyName: 'ACME Corporation',
            people: [],
            roleTypes: [
                { id: 'chairman', name: 'Chairman', color: '#f59e0b' },
                { id: 'ceo', name: 'CEO', color: '#3b82f6' },
                { id: 'cfo', name: 'CFO', color: '#10b981' },
                { id: 'coo', name: 'COO', color: '#8b5cf6' },
                { id: 'manager', name: 'Manager', color: '#ec4899' },
                { id: 'human', name: 'Human Team', color: '#06b6d4' },
                { id: 'ai', name: 'AI Agent', color: '#6366f1' }
            ]
        };

        let zoom = 1;
        let panX = 0;
        let panY = 0;
        let isDragging = false;
        let lastX = 0;
        let lastY = 0;
        let selectedPersonId = null;

        // Initialize
        function init() {
            loadFromStorage();
            if (state.people.length === 0) {
                loadDefaultData();
            }
            render();
            setupEventListeners();
        }

        function loadDefaultData() {
            state.people = [
                {
                    id: '1',
                    name: 'Alex Mercer',
                    role: 'Chairman',
                    domain: 'Board',
                    reportsTo: '',
                    type: 'chairman',
                    accountabilities: 'Board oversight, Strategic direction, CEO succession',
                    decisionRights: 'Final approval on major investments, Executive appointments'
                },
                {
                    id: '2',
                    name: 'Jordan Blake',
                    role: 'CEO',
                    domain: 'Executive',
                    reportsTo: '1',
                    type: 'ceo',
                    accountabilities: 'Company performance, Culture, Strategy execution',
                    decisionRights: 'Budget allocation over $1M, Strategic partnerships'
                },
                {
                    id: '3',
                    name: 'Taylor Reed',
                    role: 'CFO/COO',
                    domain: 'Finance & Operations',
                    reportsTo: '2',
                    type: 'cfo',
                    accountabilities: 'Financial planning, Operational efficiency, Risk management',
                    decisionRights: 'Budget approval under $500K, Vendor contracts'
                },
                {
                    id: '4',
                    name: 'Morgan Chase',
                    role: 'Operations Manager',
                    domain: 'Operations',
                    reportsTo: '3',
                    type: 'manager',
                    accountabilities: 'Daily operations, Team management, Process improvement',
                    decisionRights: 'Hiring decisions, Process changes, Expense approvals under $10K'
                }
            ];
            saveToStorage();
        }

        // Storage
        function saveToStorage() {
            localStorage.setItem('orgChartData', JSON.stringify(state));
        }

        function loadFromStorage() {
            const data = localStorage.getItem('orgChartData');
            if (data) {
                state = JSON.parse(data);
                document.getElementById('companyName').textContent = state.companyName;
            }
        }

        // Rendering
        function render() {
            const chart = document.getElementById('orgChart');
            
            if (state.people.length === 0) {
                chart.innerHTML = `
                    <div class="empty-state">
                        <h3>No people added yet</h3>
                        <p>Click "Add Person" to start building your org chart</p>
                        <button class="btn btn-primary" onclick="addNewPerson()">Add First Person</button>
                    </div>
                `;
                return;
            }

            // Find root nodes (people with no reportsTo)
            const roots = state.people.filter(p => !p.reportsTo);
            
            if (roots.length === 0) {
                // If no roots, use the first person as root
                chart.innerHTML = renderTree(state.people[0]);
            } else {
                chart.innerHTML = `<div class="org-tree">${roots.map(root => renderTree(root)).join('')}</div>`;
            }

            // Apply transform
            updateTransform();
        }

        function renderTree(person) {
            const children = state.people.filter(p => p.reportsTo === person.id);
            const roleType = state.roleTypes.find(rt => rt.id === person.type) || state.roleTypes[0];
            const isSelected = person.id === selectedPersonId;

            let html = `
                <div class="node-wrapper">
                    <div class="person-card ${isSelected ? 'selected' : ''}" 
                         style="border-color: ${roleType.color}"
                         onclick="selectPerson('${person.id}')">
                        <div class="card-header">
                            <div class="person-name">${escapeHtml(person.name)}</div>
                            <div class="person-role">${escapeHtml(person.role)}</div>
                        </div>
                        ${person.domain ? `<div class="meta-tag">${escapeHtml(person.domain)}</div>` : ''}
                    </div>
            `;

            if (children.length > 0) {
                const hasMultipleChildren = children.length > 1;
                html += `<div class="parent-line"></div>`;
                html += `<div class="children-container ${hasMultipleChildren ? '' : 'single-child'}">`;
                
                if (hasMultipleChildren) {
                    // Calculate horizontal line position
                    html += `<div class="children-horizontal-line" style="left: 50%; transform: translateX(-50%); width: ${(children.length - 1) * 260 + 40}px;"></div>`;
                }
                
                children.forEach(child => {
                    html += `<div class="child-wrapper">`;
                    html += `<div class="child-line"></div>`;
                    html += renderTree(child);
                    html += `</div>`;
                });
                
                html += `</div>`;
            }

            html += `</div>`;
            return html;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Selection and Sidebar
        function selectPerson(id) {
            selectedPersonId = id;
            render();
            openSidebar(id);
        }

        function openSidebar(personId = null) {
            const sidebar = document.getElementById('sidebar');
            const title = document.getElementById('sidebarTitle');
            const form = document.getElementById('personForm');
            const deleteBtn = document.getElementById('deleteBtn');

            // Populate dropdowns
            populateReportsToDropdown(personId);
            populateTypeDropdown();

            if (personId) {
                const person = state.people.find(p => p.id === personId);
                title.textContent = 'Edit Person';
                document.getElementById('personId').value = person.id;
                document.getElementById('personName').value = person.name;
                document.getElementById('personRole').value = person.role;
                document.getElementById('personDomain').value = person.domain || '';
                document.getElementById('personReportsTo').value = person.reportsTo || '';
                document.getElementById('personType').value = person.type;
                document.getElementById('personAccountabilities').value = person.accountabilities || '';
                document.getElementById('personDecisionRights').value = person.decisionRights || '';
                deleteBtn.style.display = 'block';
            } else {
                title.textContent = 'Add Person';
                form.reset();
                document.getElementById('personId').value = '';
                deleteBtn.style.display = 'none';
            }

            sidebar.classList.add('open');
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            selectedPersonId = null;
            render();
        }

        function populateReportsToDropdown(excludeId) {
            const select = document.getElementById('personReportsTo');
            select.innerHTML = '<option value="">None (Top Level)</option>';
            
            state.people.forEach(person => {
                if (person.id !== excludeId) {
                    select.innerHTML += `<option value="${person.id}">${escapeHtml(person.name)} - ${escapeHtml(person.role)}</option>`;
                }
            });
        }

        function populateTypeDropdown() {
            const select = document.getElementById('personType');
            select.innerHTML = state.roleTypes.map(rt => 
                `<option value="${rt.id}">${escapeHtml(rt.name)}</option>`
            ).join('');
        }

        // CRUD Operations
        function addNewPerson() {
            selectedPersonId = null;
            openSidebar();
        }

        function savePerson(event) {
            event.preventDefault();
            
            const id = document.getElementById('personId').value;
            const personData = {
                id: id || Date.now().toString(),
                name: document.getElementById('personName').value,
                role: document.getElementById('personRole').value,
                domain: document.getElementById('personDomain').value,
                reportsTo: document.getElementById('personReportsTo').value,
                type: document.getElementById('personType').value,
                accountabilities: document.getElementById('personAccountabilities').value,
                decisionRights: document.getElementById('personDecisionRights').value
            };

            if (id) {
                const index = state.people.findIndex(p => p.id === id);
                state.people[index] = personData;
            } else {
                state.people.push(personData);
            }

            saveToStorage();
            closeSidebar();
            render();
        }

        function deletePerson() {
            const id = document.getElementById('personId').value;
            if (!id) return;

            // Check if anyone reports to this person
            const hasReports = state.people.some(p => p.reportsTo === id);
            if (hasReports) {
                alert('Cannot delete this person. Reassign their reports first.');
                return;
            }

            if (confirm('Are you sure you want to delete this person?')) {
                state.people = state.people.filter(p => p.id !== id);
                saveToStorage();
                closeSidebar();
                render();
            }
        }

        // Role Types Management
        function openRoleTypesModal() {
            const list = document.getElementById('roleTypeList');
            list.innerHTML = state.roleTypes.map((rt, index) => `
                <div class="role-type-item">
                    <input type="color" class="color-picker" value="${rt.color}" data-index="${index}">
                    <input type="text" class="role-type-input" value="${escapeHtml(rt.name)}" data-index="${index}" placeholder="Role type name">
                    <button class="role-delete" onclick="removeRoleType(${index})">×</button>
                </div>
            `).join('');
            
            document.getElementById('roleTypesModal').classList.add('open');
        }

        function closeRoleTypesModal() {
            document.getElementById('roleTypesModal').classList.remove('open');
        }

        function addRoleType() {
            const list = document.getElementById('roleTypeList');
            const index = list.children.length;
            const div = document.createElement('div');
            div.className = 'role-type-item';
            div.innerHTML = `
                <input type="color" class="color-picker" value="#3b82f6" data-index="${index}">
                <input type="text" class="role-type-input" value="" data-index="${index}" placeholder="Role type name">
                <button class="role-delete" onclick="this.parentElement.remove()">×</button>
            `;
            list.appendChild(div);
        }

        function removeRoleType(index) {
            const rt = state.roleTypes[index];
            const inUse = state.people.some(p => p.type === rt.id);
            if (inUse) {
                alert('Cannot delete this role type. It is assigned to existing people.');
                return;
            }
            state.roleTypes.splice(index, 1);
            openRoleTypesModal(); // Refresh
        }

        function saveRoleTypes() {
            const items = document.querySelectorAll('.role-type-item');
            const newRoleTypes = [];
            
            items.forEach((item, idx) => {
                const color = item.querySelector('.color-picker').value;
                const name = item.querySelector('.role-type-input').value.trim();
                if (name) {
                    // Preserve original IDs where possible
                    const existing = state.roleTypes[idx];
                    newRoleTypes.push({
                        id: existing ? existing.id : 'rt_' + Date.now() + '_' + idx,
                        name: name,
                        color: color
                    });
                }
            });

            // Map old type IDs to new ones
            const oldTypes = state.roleTypes;
            state.roleTypes = newRoleTypes;

            // Update people's types if their type was removed
            state.people.forEach(person => {
                const typeExists = newRoleTypes.some(rt => rt.id === person.type);
                if (!typeExists && newRoleTypes.length > 0) {
                    person.type = newRoleTypes[0].id;
                }
            });

            saveToStorage();
            closeRoleTypesModal();
            render();
        }

        // Export/Import
        function exportData() {
            const dataStr = JSON.stringify(state, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${state.companyName.replace(/\s+/g, '_')}_org_chart.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function importData(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.people && data.roleTypes) {
                        state = data;
                        document.getElementById('companyName').textContent = state.companyName;
                        saveToStorage();
                        render();
                        alert('Organization chart imported successfully!');
                    } else {
                        alert('Invalid file format');
                    }
                } catch (err) {
                    alert('Error reading file');
                }
            };
            reader.readAsText(file);
        }

        // Zoom and Pan
        function updateTransform() {
            const content = document.getElementById('chartContent');
            content.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
            document.getElementById('zoomLevel').textContent = Math.round(zoom * 100) + '%';
        }

        function zoomIn() {
            zoom = Math.min(zoom * 1.2, 3);
            updateTransform();
        }

        function zoomOut() {
            zoom = Math.max(zoom / 1.2, 0.3);
            updateTransform();
        }

        function resetZoom() {
            zoom = 1;
            panX = 0;
            panY = 0;
            updateTransform();
        }

        function setupEventListeners() {
            const container = document.getElementById('chartContainer');

            // Mouse wheel zoom
            container.addEventListener('wheel', (e) => {
                if (e.ctrlKey || e.metaKey) {
                    e.preventDefault();
                    if (e.deltaY < 0) {
                        zoomIn();
                    } else {
                        zoomOut();
                    }
                }
            }, { passive: false });

            // Pan
            container.addEventListener('mousedown', (e) => {
                if (e.target === container || e.target.id === 'chartContent' || e.target.id === 'orgChart') {
                    isDragging = true;
                    lastX = e.clientX;
                    lastY = e.clientY;
                    container.style.cursor = 'grabbing';
                }
            });

            document.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const dx = e.clientX - lastX;
                    const dy = e.clientY - lastY;
                    panX += dx;
                    panY += dy;
                    lastX = e.clientX;
                    lastY = e.clientY;
                    updateTransform();
                }
            });

            document.addEventListener('mouseup', () => {
                isDragging = false;
                container.style.cursor = 'grab';
            });

            // Import file
            document.getElementById('importFile').addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    importData(e.target.files[0]);
                    e.target.value = '';
                }
            });

            // Company name edit
            document.getElementById('companyName').addEventListener('blur', (e) => {
                state.companyName = e.target.textContent;
                saveToStorage();
            });

            document.getElementById('companyName').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    e.target.blur();
                }
            });
        }

        // Start
        init();
    </script>
</body>
</html>
