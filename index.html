<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accountability Chart</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 20px 30px;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .company-name {
            font-size: 24px;
            font-weight: 600;
            color: #f8fafc;
            background: transparent;
            border: none;
            padding: 0;
            font-family: inherit;
            width: auto;
            min-width: 200px;
        }

        .company-name:hover {
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            padding: 4px 8px;
            margin: -4px -8px;
        }

        .company-name:focus {
            outline: none;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            padding: 4px 8px;
            margin: -4px -8px;
        }

        .header span {
            color: #64748b;
            font-size: 14px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .file-actions {
            display: flex;
            gap: 8px;
        }

        .file-btn {
            padding: 8px 16px;
            background: #334155;
            border: 1px solid #475569;
            border-radius: 6px;
            color: #e2e8f0;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .file-btn:hover {
            background: #475569;
            border-color: #64748b;
        }

        .file-btn svg {
            width: 14px;
            height: 14px;
        }

        .tabs {
            display: flex;
            gap: 10px;
        }

        .tab {
            padding: 10px 20px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            color: #94a3b8;
        }

        .tab:hover {
            background: #334155;
        }

        .tab.active {
            background: #3b82f6;
            border-color: #3b82f6;
            color: white;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }

        /* Chart View */
        .chart-view {
            display: none;
        }

        .chart-view.active {
            display: block;
        }

        .org-tree {
            display: flex;
            justify-content: center;
            padding: 40px;
            overflow: hidden;
            position: relative;
            height: calc(100vh - 200px);
            cursor: grab;
        }

        .org-tree:active {
            cursor: grabbing;
        }

        .tree-container {
            transform-origin: top center;
            transition: transform 0.1s ease-out;
        }

        .tree {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tree-node {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .node-content {
            position: relative;
            z-index: 2;
        }

        .node-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 2px solid var(--node-color, #3b82f6);
            border-radius: 12px;
            padding: 16px 24px;
            min-width: 200px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .node-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4), 0 0 20px var(--node-color, #3b82f6);
        }

        .node-name {
            font-size: 16px;
            font-weight: 600;
            color: #f8fafc;
            margin-bottom: 4px;
        }

        .node-role {
            font-size: 13px;
            color: #94a3b8;
        }

        .node-domain {
            font-size: 11px;
            color: #64748b;
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px solid #334155;
        }

        .children {
            display: flex;
            justify-content: center;
            padding-top: 50px;
            position: relative;
        }

        /* Only show vertical line from parent when there are actual children */
        .children:has(> .child-wrapper)::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 50px;
            background: #475569;
        }

        .child-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 15px;
            position: relative;
        }

        /* Vertical line up from child - only show when there are siblings */
        .child-wrapper::before {
            content: '';
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 50px;
            background: #475569;
        }

        /* Horizontal connector bar - only when there are multiple children */
        .children:has(> .child-wrapper:nth-child(2)) > .child-wrapper::after {
            content: '';
            position: absolute;
            top: -50px;
            height: 2px;
            background: #475569;
        }

        /* First child: horizontal line extends from center to right edge */
        .children:has(> .child-wrapper:nth-child(2)) > .child-wrapper:first-child::after {
            left: 50%;
            right: 0;
        }

        /* Last child: horizontal line extends from left edge to center */
        .children:has(> .child-wrapper:nth-child(2)) > .child-wrapper:last-child::after {
            left: 0;
            right: 50%;
        }

        /* Middle children: full width horizontal line */
        .children:has(> .child-wrapper:nth-child(2)) > .child-wrapper:not(:first-child):not(:last-child)::after {
            left: 0;
            right: 0;
        }

        /* Edit View */
        .edit-view {
            display: none;
        }

        .edit-view.active {
            display: block;
        }

        .edit-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 30px;
        }

        .form-panel {
            background: #1e293b;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #334155;
            height: fit-content;
            position: sticky;
            top: 30px;
        }

        .form-panel h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #f8fafc;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-top: 8px;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        .btn-secondary {
            background: #334155;
            color: #e2e8f0;
        }

        .btn-secondary:hover {
            background: #475569;
        }

        .btn-danger {
            background: #dc2626;
            color: white;
        }

        .btn-danger:hover {
            background: #b91c1c;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .btn-group .btn {
            flex: 1;
        }

        /* List Panel */
        .list-panel {
            background: #1e293b;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #334155;
        }

        .list-panel h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #f8fafc;
        }

        .person-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .person-item {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .person-item:hover {
            border-color: #3b82f6;
        }

        .person-item.selected {
            border-color: #3b82f6;
            background: #1e3a5f;
        }

        .person-info h3 {
            font-size: 15px;
            color: #f8fafc;
            margin-bottom: 4px;
        }

        .person-info p {
            font-size: 13px;
            color: #64748b;
        }

        .person-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 6px;
            background: #334155;
            color: #94a3b8;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background: #3b82f6;
            color: white;
        }

        .icon-btn.delete:hover {
            background: #dc2626;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }

        .empty-state h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: #94a3b8;
        }

        /* Zoom Controls */
        .zoom-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            z-index: 100;
        }

        .zoom-btn {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: #1e293b;
            border: 1px solid #334155;
            color: #e2e8f0;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .zoom-btn:hover {
            background: #334155;
            border-color: #475569;
        }

        /* Legend */
        .legend {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #94a3b8;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        /* Role Types Management */
        .role-types-section {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #334155;
        }

        .role-types-section h3 {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 12px;
        }

        .role-type-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .role-type-item input[type="text"] {
            flex: 1;
            padding: 8px 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #e2e8f0;
            font-size: 13px;
        }

        .role-type-item input[type="color"] {
            width: 40px;
            height: 32px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: transparent;
        }

        .role-type-item .icon-btn {
            width: 28px;
            height: 28px;
        }

        .add-role-btn {
            background: transparent;
            border: 1px dashed #475569;
            color: #64748b;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            width: 100%;
            margin-top: 8px;
        }

        .add-role-btn:hover {
            border-color: #3b82f6;
            color: #3b82f6;
        }

        /* Settings Panel */
        .settings-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #3b82f6;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
            transition: all 0.2s;
        }

        .settings-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1e293b;
            border-radius: 16px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid #334155;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-header h2 {
            font-size: 20px;
            color: #f8fafc;
        }

        .close-modal {
            background: none;
            border: none;
            color: #64748b;
            font-size: 24px;
            cursor: pointer;
        }

        .close-modal:hover {
            color: #e2e8f0;
        }

        @media (max-width: 900px) {
            .edit-layout {
                grid-template-columns: 1fr;
            }

            .form-panel {
                position: static;
            }

            .header-actions {
                flex-wrap: wrap;
                gap: 10px;
            }

            .file-actions {
                order: 2;
                width: 100%;
            }

            .org-tree {
                height: calc(100vh - 250px);
            }

            .zoom-controls {
                bottom: 10px;
                right: 10px;
            }

            .zoom-btn {
                width: 36px;
                height: 36px;
            }

            .children {
                flex-direction: column;
                align-items: center;
                gap: 30px;
            }

            .child-wrapper {
                padding: 20px 0;
            }

            .child-wrapper::before,
            .children::before,
            .child-wrapper::after {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <input type="text" class="company-name" id="companyName" value="Kasko Cattle">
            <span>Organizational Accountability Chart</span>
        </div>
        <div class="header-actions">
            <div class="file-actions">
                <button class="file-btn" onclick="exportData()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    Save to File
                </button>
                <button class="file-btn" onclick="document.getElementById('fileInput').click()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    Load from File
                </button>
                <input type="file" id="fileInput" accept=".json" style="display: none;" onchange="importData(this)">
            </div>
            <div class="tabs">
                <button class="tab active" onclick="showView('chart')">Chart View</button>
                <button class="tab" onclick="showView('edit')">Edit People</button>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- Chart View -->
        <div id="chartView" class="chart-view active">
            <div class="legend" id="legend">
                <!-- Legend items rendered here -->
            </div>
            <div class="zoom-controls">
                <button class="zoom-btn" onclick="zoomIn()" title="Zoom In">+</button>
                <button class="zoom-btn" onclick="resetZoom()" title="Reset">⟲</button>
                <button class="zoom-btn" onclick="zoomOut()" title="Zoom Out">−</button>
            </div>
            <div id="orgTree" class="org-tree">
                <!-- Tree will be rendered here -->
            </div>
        </div>

        <!-- Edit View -->
        <div id="editView" class="edit-view">
            <div class="edit-layout">
                <div class="form-panel">
                    <h2 id="formTitle">Add Person</h2>
                    <form id="personForm">
                        <input type="hidden" id="personId">
                        <div class="form-group">
                            <label>Name</label>
                            <input type="text" id="name" placeholder="e.g., John Smith" required>
                        </div>
                        <div class="form-group">
                            <label>Role / Title</label>
                            <input type="text" id="role" placeholder="e.g., Operations Manager" required>
                        </div>
                        <div class="form-group">
                            <label>Domain / Function</label>
                            <input type="text" id="domain" placeholder="e.g., Operations">
                        </div>
                        <div class="form-group">
                            <label>Reports To</label>
                            <select id="reportsTo">
                                <option value="">None (Top Level)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Type</label>
                            <select id="type">
                                <!-- Options populated dynamically -->
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Key Accountabilities</label>
                            <textarea id="accountabilities" placeholder="What this role is responsible for..."></textarea>
                        </div>
                        <div class="form-group">
                            <label>Decision Rights</label>
                            <textarea id="decisions" placeholder="What decisions can this role make..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Save Person</button>
                        <button type="button" class="btn btn-secondary" onclick="resetForm()">Clear Form</button>
                        <button type="button" id="deleteBtn" class="btn btn-danger" style="display: none; margin-top: 10px;" onclick="deletePerson()">Delete Person</button>
                    </form>

                    <div class="role-types-section">
                        <h3>Role Types</h3>
                        <div id="roleTypesList">
                            <!-- Role types rendered here -->
                        </div>
                        <button class="add-role-btn" onclick="addRoleType()">+ Add Role Type</button>
                    </div>
                </div>

                <div class="list-panel">
                    <h2>People</h2>
                    <div id="personList" class="person-list">
                        <!-- List will be rendered here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Default role types with colors
        const defaultRoleTypes = [
            { id: 'chairman', name: 'Chairman', color: '#f59e0b' },
            { id: 'ai-agent', name: 'AI Agent', color: '#10b981' },
            { id: 'human', name: 'Human Team', color: '#3b82f6' }
        ];

        // Data storage
        let companyName = localStorage.getItem('org_chart_company_name') || 'Kasko Cattle';
        let roleTypes = JSON.parse(localStorage.getItem('org_chart_role_types')) || defaultRoleTypes;
        let people = JSON.parse(localStorage.getItem('org_chart_people')) || [
            { id: 1, name: "Nathaniel Hubbard", role: "Chairman", domain: "Governance", reportsTo: null, type: "chairman", accountabilities: "Strategic direction; final authority", decisions: "All major decisions" },
            { id: 2, name: "Belisarius", role: "CEO", domain: "Executive", reportsTo: 1, type: "ai-agent", accountabilities: "Strategy execution; operations oversight", decisions: "Day-to-day operations; hiring" },
            { id: 3, name: "Ghost", role: "CFO/COO", domain: "Finance/Operations", reportsTo: 2, type: "ai-agent", accountabilities: "Financial management; operational efficiency", decisions: "Budget approval; vendor selection" },
            { id: 4, name: "Ironhide", role: "Maintenance Ops Lead", domain: "Maintenance", reportsTo: 3, type: "ai-agent", accountabilities: "Equipment maintenance; field operations", decisions: "Maintenance scheduling; parts procurement" }
        ];

        let editingId = null;

        // Save to localStorage
        function saveData() {
            localStorage.setItem('org_chart_company_name', companyName);
            localStorage.setItem('org_chart_role_types', JSON.stringify(roleTypes));
            localStorage.setItem('org_chart_people', JSON.stringify(people));
        }

        // Initialize
        function init() {
            document.getElementById('companyName').value = companyName;
            renderRoleTypes();
            updateTypeSelect();
            showView('chart');
        }

        // Company name change
        document.getElementById('companyName').addEventListener('change', function() {
            companyName = this.value;
            saveData();
        });

        // Show different views
        function showView(view) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.chart-view, .edit-view').forEach(v => v.classList.remove('active'));
            
            if (view === 'chart') {
                document.getElementById('chartView').classList.add('active');
                document.querySelectorAll('.tab')[0].classList.add('active');
                renderTree();
                renderLegend();
            } else {
                document.getElementById('editView').classList.add('active');
                document.querySelectorAll('.tab')[1].classList.add('active');
                renderList();
                updateReportsToOptions();
                renderRoleTypes();
            }
        }

        // Render legend
        function renderLegend() {
            const container = document.getElementById('legend');
            container.innerHTML = roleTypes.map(rt => `
                <div class="legend-item">
                    <div class="legend-dot" style="background: ${rt.color}"></div>
                    <span>${rt.name}</span>
                </div>
            `).join('');
        }

        // Build tree structure
        function buildTree() {
            const root = people.filter(p => !p.reportsTo);
            
            function addChildren(parent) {
                const children = people.filter(p => p.reportsTo === parent.id);
                return {
                    ...parent,
                    children: children.map(addChildren)
                };
            }
            
            return root.map(addChildren);
        }

        // Get color for person type
        function getTypeColor(typeId) {
            const type = roleTypes.find(rt => rt.id === typeId);
            return type ? type.color : '#3b82f6';
        }

        // Render tree recursively
        function renderTreeNode(node) {
            const hasChildren = node.children && node.children.length > 0;
            const nodeColor = getTypeColor(node.type);
            
            let html = `
                <div class="tree-node">
                    <div class="node-content">
                        <div class="node-card" style="--node-color: ${nodeColor}" onclick="selectPerson(${node.id})">
                            <div class="node-name">${node.name}</div>
                            <div class="node-role">${node.role}</div>
                            ${node.domain ? `<div class="node-domain">${node.domain}</div>` : ''}
                        </div>
                    </div>
            `;
            
            if (hasChildren) {
                html += '<div class="children">';
                node.children.forEach(child => {
                    html += `<div class="child-wrapper">${renderTreeNode(child)}</div>`;
                });
                html += '</div>';
            }
            
            html += '</div>';
            return html;
        }

        // Zoom state
        let zoomLevel = 1;
        let panX = 0;
        let panY = 0;
        let isDragging = false;
        let lastMouseX = 0;
        let lastMouseY = 0;

        // Render org tree
        function renderTree() {
            const tree = buildTree();
            const container = document.getElementById('orgTree');
            
            if (tree.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>No people added yet</h3>
                        <p>Switch to Edit People to add your team</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = '<div class="tree-container" id="treeContainer"><div class="tree">' + tree.map(renderTreeNode).join('') + '</div></div>';
            applyTransform();
            setupPanZoom();
        }

        // Apply zoom and pan transform
        function applyTransform() {
            const container = document.getElementById('treeContainer');
            if (container) {
                container.style.transform = `translate(${panX}px, ${panY}px) scale(${zoomLevel})`;
            }
        }

        // Zoom in
        function zoomIn() {
            zoomLevel = Math.min(zoomLevel * 1.2, 3);
            applyTransform();
        }

        // Zoom out
        function zoomOut() {
            zoomLevel = Math.max(zoomLevel / 1.2, 0.3);
            applyTransform();
        }

        // Reset zoom
        function resetZoom() {
            zoomLevel = 1;
            panX = 0;
            panY = 0;
            applyTransform();
        }

        // Setup pan/zoom interactions
        function setupPanZoom() {
            const treeArea = document.getElementById('orgTree');
            if (!treeArea) return;

            // Mouse wheel zoom
            treeArea.addEventListener('wheel', function(e) {
                e.preventDefault();
                const delta = e.deltaY > 0 ? 0.9 : 1.1;
                zoomLevel = Math.max(0.3, Math.min(3, zoomLevel * delta));
                applyTransform();
            }, { passive: false });

            // Mouse drag to pan
            treeArea.addEventListener('mousedown', function(e) {
                if (e.target.closest('.node-card')) return; // Don't drag when clicking nodes
                isDragging = true;
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
                treeArea.style.cursor = 'grabbing';
            });

            document.addEventListener('mousemove', function(e) {
                if (!isDragging) return;
                const deltaX = e.clientX - lastMouseX;
                const deltaY = e.clientY - lastMouseY;
                panX += deltaX;
                panY += deltaY;
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
                applyTransform();
            });

            document.addEventListener('mouseup', function() {
                isDragging = false;
                treeArea.style.cursor = 'grab';
            });
        }

        // Update type select dropdown
        function updateTypeSelect() {
            const select = document.getElementById('type');
            select.innerHTML = roleTypes.map(rt => 
                `<option value="${rt.id}">${rt.name}</option>`
            ).join('');
        }

        // Update reports-to dropdown
        function updateReportsToOptions() {
            const select = document.getElementById('reportsTo');
            const currentId = editingId;
            
            let html = '<option value="">None (Top Level)</option>';
            people.forEach(p => {
                if (p.id !== currentId && !isDescendant(currentId, p.id)) {
                    html += `<option value="${p.id}">${p.name} - ${p.role}</option>`;
                }
            });
            select.innerHTML = html;
        }

        // Check if person is descendant of another
        function isDescendant(parentId, childId) {
            if (!parentId) return false;
            const children = people.filter(p => p.reportsTo === parentId);
            for (const child of children) {
                if (child.id === childId) return true;
                if (isDescendant(child.id, childId)) return true;
            }
            return false;
        }

        // Render role types in settings
        function renderRoleTypes() {
            const container = document.getElementById('roleTypesList');
            container.innerHTML = roleTypes.map((rt, idx) => `
                <div class="role-type-item">
                    <input type="color" value="${rt.color}" onchange="updateRoleTypeColor(${idx}, this.value)">
                    <input type="text" value="${rt.name}" onchange="updateRoleTypeName(${idx}, this.value)" placeholder="Type name">
                    <button class="icon-btn delete" onclick="removeRoleType(${idx})">✕</button>
                </div>
            `).join('');
            updateTypeSelect();
        }

        // Add new role type
        function addRoleType() {
            const newId = 'type_' + Date.now();
            roleTypes.push({ id: newId, name: 'New Type', color: '#64748b' });
            saveData();
            renderRoleTypes();
        }

        // Update role type color
        function updateRoleTypeColor(idx, color) {
            roleTypes[idx].color = color;
            saveData();
            renderTree();
        }

        // Update role type name
        function updateRoleTypeName(idx, name) {
            roleTypes[idx].name = name;
            saveData();
            renderTree();
            renderLegend();
        }

        // Remove role type
        function removeRoleType(idx) {
            if (roleTypes.length <= 1) {
                alert('You need at least one role type');
                return;
            }
            const removedType = roleTypes[idx];
            roleTypes.splice(idx, 1);
            
            // Update people with this type to the first available type
            people.forEach(p => {
                if (p.type === removedType.id) {
                    p.type = roleTypes[0].id;
                }
            });
            
            saveData();
            renderRoleTypes();
            renderList();
            renderTree();
        }

        // Render person list
        function renderList() {
            const container = document.getElementById('personList');
            
            if (people.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>No people added yet</h3>
                        <p>Use the form to add your first person</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = people.map(p => {
                const reportsTo = people.find(x => x.id === p.reportsTo);
                const type = roleTypes.find(rt => rt.id === p.type);
                return `
                    <div class="person-item ${editingId === p.id ? 'selected' : ''}" onclick="editPerson(${p.id})">
                        <div class="person-info">
                            <h3>${p.name}</h3>
                            <p>${p.role}${p.domain ? ` • ${p.domain}` : ''}${reportsTo ? ` → reports to ${reportsTo.name}` : ''}</p>
                        </div>
                        <div class="person-actions">
                            <span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:${type?.color || '#3b82f6'};margin-right:8px;"></span>
                            <button class="icon-btn" onclick="event.stopPropagation(); editPerson(${p.id})">✎</button>
                            <button class="icon-btn delete" onclick="event.stopPropagation(); confirmDelete(${p.id})">✕</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Form submission
        document.getElementById('personForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const personData = {
                id: editingId || Date.now(),
                name: document.getElementById('name').value,
                role: document.getElementById('role').value,
                domain: document.getElementById('domain').value,
                reportsTo: document.getElementById('reportsTo').value ? parseInt(document.getElementById('reportsTo').value) : null,
                type: document.getElementById('type').value,
                accountabilities: document.getElementById('accountabilities').value,
                decisions: document.getElementById('decisions').value
            };
            
            if (editingId) {
                const idx = people.findIndex(p => p.id === editingId);
                people[idx] = personData;
            } else {
                people.push(personData);
            }
            
            saveData();
            resetForm();
            renderList();
            updateReportsToOptions();
        });

        // Edit person
        function editPerson(id) {
            editingId = id;
            const person = people.find(p => p.id === id);
            
            document.getElementById('formTitle').textContent = 'Edit Person';
            document.getElementById('personId').value = person.id;
            document.getElementById('name').value = person.name;
            document.getElementById('role').value = person.role;
            document.getElementById('domain').value = person.domain || '';
            document.getElementById('reportsTo').value = person.reportsTo || '';
            document.getElementById('type').value = person.type || roleTypes[0].id;
            document.getElementById('accountabilities').value = person.accountabilities || '';
            document.getElementById('decisions').value = person.decisions || '';
            document.getElementById('deleteBtn').style.display = 'block';
            
            updateReportsToOptions();
            renderList();
        }

        // Select from chart
        function selectPerson(id) {
            showView('edit');
            editPerson(id);
        }

        // Reset form
        function resetForm() {
            editingId = null;
            document.getElementById('formTitle').textContent = 'Add Person';
            document.getElementById('personForm').reset();
            document.getElementById('deleteBtn').style.display = 'none';
            updateReportsToOptions();
            renderList();
        }

        // Confirm delete
        function confirmDelete(id) {
            if (confirm('Delete this person? Any people reporting to them will become top-level.')) {
                // Reassign children to top level
                people.forEach(p => {
                    if (p.reportsTo === id) {
                        p.reportsTo = null;
                    }
                });
                
                people = people.filter(p => p.id !== id);
                saveData();
                resetForm();
                renderList();
            }
        }

        // Delete person
        function deletePerson() {
            if (editingId) {
                confirmDelete(editingId);
            }
        }

        // Export data to JSON file
        function exportData() {
            const data = {
                version: '1.0',
                exportedAt: new Date().toISOString(),
                companyName: companyName,
                roleTypes: roleTypes,
                people: people
            };
            
            const json = JSON.stringify(data, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            // Create filename with company name and date
            const date = new Date().toISOString().split('T')[0];
            const safeName = companyName.replace(/[^a-z0-9]/gi, '_').toLowerCase();
            const filename = `${safeName}_org_chart_${date}.json`;
            
            // Trigger download
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Import data from JSON file
        function importData(input) {
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    
                    // Validate data structure
                    if (!data.people || !Array.isArray(data.people)) {
                        throw new Error('Invalid file format: missing people data');
                    }
                    
                    // Confirm if there's existing data
                    if (people.length > 0) {
                        if (!confirm('This will replace all current data. Are you sure?')) {
                            input.value = '';
                            return;
                        }
                    }
                    
                    // Load the data
                    companyName = data.companyName || 'Organization';
                    roleTypes = data.roleTypes || defaultRoleTypes;
                    people = data.people;
                    
                    // Save to localStorage
                    saveData();
                    
                    // Update UI
                    document.getElementById('companyName').value = companyName;
                    renderRoleTypes();
                    updateTypeSelect();
                    
                    // Refresh current view
                    const chartView = document.getElementById('chartView');
                    if (chartView.classList.contains('active')) {
                        renderTree();
                        renderLegend();
                    } else {
                        renderList();
                        resetForm();
                    }
                    
                    alert('Data loaded successfully!');
                } catch (err) {
                    alert('Error loading file: ' + err.message);
                }
                input.value = '';
            };
            reader.readAsText(file);
        }

        // Initialize on load
        init();
    </script>
</body>
</html>
